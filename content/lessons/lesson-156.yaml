# ============================================================
# LESSON 156 · Sustain pedal intro
# Tier 4 · Act 32 · Intermediate
# The right-foot pedal — heel down, toe down.
# ============================================================
id: 156
tier: intermediate
act: 32
title: "Sustain pedal intro"
subtitle: "Act 32 · Sustain pedal"
goal: "Meet the sustain pedal — what it is, where it is, and how to press it with your foot."
prereqs: [155]
method_focus: "play"
time_estimate_min: 12
piece_context: "New act, new world. For the last 155 lessons you've only used your hands. Today we add your right foot. The pedal changes everything — it lets notes ring after your fingers leave the keys."
metaphor: "right-foot-tool"
vibe: ["gentle", "focused"]

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy standing beside a grand piano. Three brass pedals glinting at the bottom. Banner: ACT 32 · SUSTAIN PEDAL."
    cleffy: >
      New act. New body part.
      For 155 lessons, hands only.
      Today — your right foot joins the band.

  - id: 2
    mode: see
    type: three_pedals
    figure: "Close-up of three piano pedals on a grand piano. Labels: LEFT — soft pedal (una corda). MIDDLE — sostenuto. RIGHT — sustain (damper)."
    cleffy: >
      There are three pedals.
      Left one softens. Middle one holds specific notes — rarely used.
      The right one is the star. The sustain pedal. That's the one.

  - id: 3
    mode: see
    type: what_sustain_does
    figure: "Cross-section of a piano. Dampers lifted off the strings. Caption: 'Pedal down = dampers lifted = notes ring.'"
    cleffy: >
      Inside the piano, little felt dampers sit on the strings.
      Dampers stop notes from ringing after you lift your finger.
      The sustain pedal lifts all the dampers at once. Every note you played keeps ringing.

  - id: 4
    mode: hear
    type: hear_the_difference
    figure: "Play button. Label: SAME CHORD — WITH AND WITHOUT PEDAL."
    audio:
      A: "A C major chord played, fingers released — sound stops abruptly. Then the same chord played with pedal — sound blooms and rings for 4 seconds."
    cleffy: >
      Listen.
      First — no pedal. Chord stops the moment fingers lift.
      Second — pedal down. Chord blooms. Rings on its own.

  - id: 5
    mode: see
    type: foot_position
    figure: "Illustration of a right foot on the sustain pedal. Heel on the floor, toe resting on the pedal. Arrow showing the pedal pivoting down from the ball of the foot."
    cleffy: >
      How to press it.
      Heel stays on the floor. Always.
      Toe rests on the pedal. Press with the ball of the foot.
      Heel down, toe down. That's the grip.

  - id: 6
    mode: see
    type: why_heel_down
    figure: "Two illustrations side by side. Left: foot flat, heel on floor — smooth arc of motion. Right: heel lifted, whole foot floating — shaky arrow."
    cleffy: >
      Why heel down?
      Control. Your foot is a lever now. The heel is the hinge.
      Heel lifted — no hinge. Foot wobbles. Pedal thumps.

  - id: 7
    mode: see
    type: virtual_note
    figure: "Split screen. Left: real piano with a foot on the pedal. Right: Sonata app on a laptop with a little pedal icon at the bottom of the keyboard."
    cleffy: >
      Quick note. If you're on a real piano — press pedal when I say so.
      If you're on a virtual keyboard — don't worry. The app holds the sound for you when a pedal moment happens.
      Same lesson, both ways.

  - id: 8
    mode: play
    type: first_pedal_press
    figure: "Keyboard. C4 glowing. Pedal icon at bottom — PRESS ON CUE."
    cleffy: >
      First try. Play C. Hold it.
      Now press the pedal — heel down, toe down.
      Now lift your finger. The note keeps ringing.
    interaction:
      type: sequence
      keys: ["C4"]

  - id: 9
    mode: hear
    type: hear_held_c
    figure: "Play button. Label: C HELD BY PEDAL, 5 SECONDS."
    audio:
      A: "Single C4 note, finger lifts after half a second, pedal holds the sound ringing gently for 5 seconds, then pedal releases and sound cuts."
    cleffy: >
      Listen to what you just did.
      One finger press. Five seconds of sound.
      That's the pedal's job.

  - id: 10
    mode: play
    type: chord_with_pedal
    figure: "Keyboard. C major triad — C4 E4 G4 — glowing. Pedal icon lit."
    cleffy: >
      Now a chord. Play C, E, G together.
      Pedal down before you lift your hand. Let it ring.
    interaction:
      type: sequence
      keys: ["C4", "E4", "G4"]

  - id: 11
    mode: see
    type: pedal_release
    figure: "Pedal icon in three states: UP, DOWN, UP. Arrow from down to up labeled 'lift foot cleanly.'"
    cleffy: >
      The release matters too.
      Lift your toe — pedal comes up — dampers drop — sound stops.
      No stomp. No slam. Smooth up, smooth down.

  - id: 12
    mode: play
    type: press_release_cycle
    figure: "Keyboard. C4 glowing. Pedal icon cycling: down, up, down, up."
    cleffy: >
      Play C. Pedal down. Lift finger — note rings.
      Pedal up — note stops.
      Press again. Feel the lever.
    interaction:
      type: sequence
      keys: ["C4"]

  - id: 13
    mode: play
    type: two_chords_with_pedal
    figure: "Keyboard. C major then G major. Pedal guidance: down, up, down, up."
    cleffy: >
      Two chords. C major, then G major.
      Pedal down for C, pedal up before G, pedal down again for G.
      Don't hold pedal through both. That would mix them — we'll cover that tomorrow.
    interaction:
      type: sequence
      keys: ["C4", "E4", "G4", "G4", "B4", "D5"]
    followup_cleffy: >
      Right foot, doing its first real job.

  - id: 14
    mode: hear
    type: pre_check
    figure: "Banner — three quick questions."
    cleffy: >
      Three quick ones.

  - id: 15
    mode: see
    type: wrap
    figure: "Postcard — Lesson 156. A silhouette of a foot on a pedal. Banner: ACT 32 BEGINS."
    cleffy: >
      Sustain pedal. Right foot. Heel down, toe down.
      Tomorrow — change pedal with each new chord.

practice_this_week:
  real_piano:
    - "Sit at the piano. Heel on floor. Foot on sustain pedal. Press and release ten times without playing anything. Feel the lever."
    - "Play any chord you know. Press pedal after. Let it ring. Then release."
  virtual_only:
    - "Replay pages 8, 10, and 13 — pay attention to the pedal icon cues"
  estimated_time: "8 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Three piano pedals"
          prompt: "Which pedal is the sustain pedal?"
          options: ["Left", "Middle", "Right"]
          correct: 2
        - figure: "Foot on pedal"
          prompt: "Where should your heel be?"
          options: ["Lifted off the floor", "On the floor, always", "Resting on the pedal"]
          correct: 1
        - figure: "Inside of a piano"
          prompt: "What does the sustain pedal actually do?"
          options: ["Makes the piano quieter", "Lifts the dampers so notes keep ringing", "Changes which strings are hit"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Chord played with pedal, then without"
          prompt: "Which version rings longer?"
          options: ["The one with pedal", "The one without pedal"]
          correct: 0
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play C major chord (C4 E4 G4). Hold the pedal so the chord rings after your hand lifts."
          accept: "C4 E4 G4 played together, sound sustains after release"

remediation:
  id: "156.5"
  title: "Pedal, no notes"
  pages: 6
  opening_cleffy: >
    Coordinating foot with hands is new.
    We'll practice the foot alone first. No notes. Just pedal down, pedal up, ten times in a row.
    Then one note. Then a chord.

completion:
  cleffy: >
    Right foot in. The pedal is yours.
    Tomorrow — change pedal every time the harmony changes.
  xp: 17
  unlocks: 157
