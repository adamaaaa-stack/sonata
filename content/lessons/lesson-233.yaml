# ============================================================
# LESSON 233 · Playing softly for minutes
# Tier 6 · Act 47 · Advanced · Recording & dynamics at scale
# Pianissimo endurance. Forearm. Attention. Harder than it sounds.
# ============================================================
id: 233
tier: advanced
act: 47
title: "Playing softly for minutes"
subtitle: "Act 47 · Pianissimo endurance"
goal: "Hold a true pianissimo for three to five minutes — without losing touch, drifting louder, or tensing up."
prereqs: [232, 141, 142]
method_focus: "play"
time_estimate_min: 15
piece_context: "Pianissimo for five seconds is easy. Pianissimo for five minutes is one of the hardest things a pianist does. Your forearm tenses. Your attention drifts. You start creeping back to mf without noticing. Today we practice holding the quiet."
metaphor: "whisper-for-minutes"
vibe: ["quiet", "focused", "honest"]

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy at a piano in a dark room, one small lamp. His hand is feather-light on the keys. Caption: WHISPER FOR MINUTES."
    cleffy: >
      Pianissimo for three minutes.
      Sounds easy. It's not.
      Today — why it's hard, and how to hold it.

  - id: 2
    mode: see
    type: why_hard
    figure: "Three panels. 1: a forearm with tension-hatching, caption 'forearm tightens.' 2: a brain with drifting arrows, caption 'attention wanders.' 3: a waveform creeping louder, caption 'you drift back to mf without noticing.'"
    cleffy: >
      Three reasons pianissimo for minutes is hard.
      One — your forearm tenses from controlling such small motions.
      Two — your attention drifts. Soft music is easier to zone out of.
      Three — you slowly creep louder, and don't hear it happen.

  - id: 3
    mode: hear
    type: the_creep
    figure: "A long waveform labeled 'pp target.' At the start, the amplitude sits low. Over the next thirty seconds, it creeps up without any sudden change — ending closer to mf."
    audio:
      A: "A held soft passage that starts at pp and, over thirty seconds, drifts to mf — no sudden change, just slow creep"
    cleffy: >
      Listen. Thirty seconds.
      The player meant to stay pp the whole time.
      Did they?
      That slow drift is the thing we're training against.

  - id: 4
    mode: see
    type: arm_weight_at_pp
    figure: "Two hands side by side. Left: a pressed-down, tense hand making pp — veins, white knuckles. Right: a relaxed hand, wrist soft, fingertips light as a feather making pp. Arrow from left to right: 'wrong → right.'"
    cleffy: >
      The common mistake — holding back with tension.
      Fingers tight. Forearm clenched. Pressing the keys just enough to make a sound.
      After a minute, your arm is rock.
      The right way — let the arm hang. Drop the finger with almost no weight.
      Gravity plays pp better than muscle does.

  - id: 5
    mode: see
    type: the_surface
    figure: "A close-up of a fingertip on a key. A tiny arrow labeled 'stay on the surface.' The key barely depresses — just enough to make a sound."
    cleffy: >
      Stay on the surface of the key.
      Your finger doesn't lift high. Your finger rides the key.
      Small motion. Close contact.
      That's how pp stays pp for minutes.

  - id: 6
    mode: play
    type: one_note_pp
    figure: "Keyboard. A single C4 key glowing faintly. Banner: ONE NOTE. 30 SECONDS. PP."
    cleffy: >
      One note. C. Pianissimo.
      Play it. Soft as you can. Ten times. Each one the same whisper.
      No creep. Same volume on the first and the tenth.
    interaction:
      type: rhythm
      sequence: ["C4","C4","C4","C4","C4","C4","C4","C4","C4","C4"]
      durations: ["quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter"]
      tempo: 50

  - id: 7
    mode: play
    type: slow_scale_pp
    figure: "Keyboard. C major scale glowing faintly. Caption: SLOW SCALE. PP. ONE MINUTE."
    cleffy: >
      C scale up and down. Slow. All pianissimo.
      Don't rush. Listen for creep.
      If one note pops louder — stop, reset, begin again.
    interaction:
      type: rhythm
      sequence: ["C4","D4","E4","F4","G4","A4","B4","C5","B4","A4","G4","F4","E4","D4","C4"]
      durations: ["half","half","half","half","half","half","half","half","half","half","half","half","half","half","half"]
      tempo: 40

  - id: 8
    mode: see
    type: the_breath_check
    figure: "A checklist. Every thirty seconds, check: shoulders down? wrist loose? forearm soft? fingertips on the key surface? ear still listening?"
    cleffy: >
      Every thirty seconds — check in.
      Shoulders down.
      Wrist loose.
      Forearm soft.
      Fingertips on the surface.
      Ear still listening.
      If any of those slip, you slip.

  - id: 9
    mode: hear
    type: listen_for_drift
    figure: "Two play buttons. A: two minutes of pp held true. B: two minutes where the middle thirty seconds drifts to mp."
    audio:
      A: "A two-minute pp passage — quiet held steadily throughout"
      B: "A two-minute passage starting pp, drifting to mp across the middle, staying mp to the end"
    cleffy: >
      Two takes.
      First — pp the whole way.
      Second — drifts louder after thirty seconds.
      Train your ear to catch that in yourself.

  - id: 10
    mode: play
    type: longer_pp_phrase
    figure: "Grand staff. A slow flowing eight-bar phrase, all pp. Tempo 45."
    cleffy: >
      Longer test. Eight bars. All pp.
      Right hand melody. Left hand quiet chords.
      Don't rush. Don't let the end get louder than the start.
    interaction:
      type: song
      sequence: [["C4","C3"],"E4","G4",["F4","F3"],"A4","C5",["E4","E3"],"G4",["D4","D3"],"F4","A4",["G4","G3"],"B4","D5",["C5","C3"],"C5","C5","C5"]
      guides: true
      tempo: 45

  - id: 11
    mode: see
    type: subito_vs_endurance
    figure: "Two diagrams. Left: a pp block stamped with 'subito pp — easy' — just one drop. Right: a long pp horizontal line labeled 'pp for minutes — hard.'"
    cleffy: >
      Subito pp — a sudden drop — is easy.
      One moment. One drop. Done.
      Pp for minutes is different. It's endurance.
      Different skill. Today's skill.

  - id: 12
    mode: play
    type: endurance_run
    figure: "Grand staff. Same phrase as page 10, repeated three times in a row. Tempo 45. Caption: '90 seconds straight. pp the whole way.'"
    cleffy: >
      Ninety seconds of pp in a row.
      Three times through the same phrase.
      Check in on your body each time through.
      If your arm tightens — don't stop. Soften. Keep playing.
    interaction:
      type: song
      sequence: [["C4","C3"],"E4","G4",["F4","F3"],"A4","C5",["E4","E3"],"G4",["D4","D3"],"F4","A4",["G4","G3"],"B4","D5",["C5","C3"],"C5","C5","C5",["C4","C3"],"E4","G4",["F4","F3"],"A4","C5",["E4","E3"],"G4",["D4","D3"],"F4","A4",["G4","G3"],"B4","D5",["C5","C3"],"C5","C5","C5",["C4","C3"],"E4","G4",["F4","F3"],"A4","C5",["E4","E3"],"G4",["D4","D3"],"F4","A4",["G4","G3"],"B4","D5",["C5","C3"],"C5","C5","C5"]
      guides: false
      tempo: 45
    followup_cleffy: >
      Ninety seconds.
      If the last fifteen were the same volume as the first fifteen — that's the skill.
      If they drifted — note where, and try again tomorrow.

  - id: 13
    mode: see
    type: why_this_matters
    figure: "A sheet of the Moonlight Sonata opening. Caption: 'the whole first movement is pp to p. Five and a half minutes.'"
    cleffy: >
      Why this matters now.
      The Moonlight Sonata first movement is five and a half minutes.
      Almost all of it is pp to p.
      Graduation asks you to hold the quiet that long.
      Starts today.

  - id: 14
    mode: hear
    type: pre_check
    figure: "Banner — mastery check."
    cleffy: >
      Three quick ones.

  - id: 15
    mode: see
    type: wrap
    figure: "Postcard — Lesson 233. A feather resting on a piano key. Caption: 'hold the whisper.'"
    cleffy: >
      Pianissimo endurance. The quiet muscle.
      Tomorrow — rehearsal without touching the keys. Mental practice.

practice_this_week:
  real_piano:
    - "Set a timer for two minutes. Play anything — scales, a piece, arpeggios — all pp. Every note the same whisper."
    - "Halfway through, check in. Shoulders down? Wrist loose? Did you drift louder?"
    - "Play one section of your memorized piece pp the whole way. Record. Listen back. Did you creep?"
  virtual_only:
    - "Replay pages 7, 10, and 12 — short pp, longer pp, and the ninety-second endurance run."
  estimated_time: "12 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Two hands — one tense with white knuckles, one relaxed with a soft wrist"
          prompt: "Which hand makes a better sustained pianissimo?"
          options: ["Tense, controlled hand", "Relaxed, soft-wrist hand"]
          correct: 1
        - figure: "A waveform starting pp and drifting to mf over thirty seconds"
          prompt: "This is an example of…"
          options: ["Subito pp", "Dynamic creep", "A crescendo you wrote in"]
          correct: 1
        - figure: "Two blocks labeled 'subito pp' and 'pp for minutes'"
          prompt: "Which is harder?"
          options: ["Subito pp (the sudden drop)", "Pp held for minutes"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Two takes — one pp held steadily, one that drifts louder in the middle"
          prompt: "Which holds pianissimo the whole way?"
          options: ["First", "Second"]
          correct: 0
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play a C scale up and down, all pianissimo. Every note the same whisper."
          accept: "C major scale played at steady pp throughout"

remediation:
  id: "233.5"
  title: "Pianissimo, simpler"
  pages: 6
  opening_cleffy: >
    Pp endurance is the hardest dynamic skill. No shame in slowing down.
    We'll practice one note held pp, then a two-note pattern, then a slow scale.
    Small steps. The quiet isn't going anywhere.

completion:
  cleffy: >
    Pianissimo for minutes. A quiet muscle built today.
    You'll need it for Moonlight.
    Tomorrow — the strangest exercise in the tier. Rehearsing without touching the keys.
  xp: 18
  unlocks: 234
