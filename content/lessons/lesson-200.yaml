  - id: 15
    mode: play
    type: full_piece_no_guides
    figure: "Same score. No guides. Reader on their own. Metronome 52."
    cleffy: >
      No guides. You read.
      All your tools. Use them.
    interaction:
      type: song
      sequence: [["Bb4", "Eb3"], ["G4", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["Ab4", "Eb3"], ["G4", "Bb3", "G4"], ["Ab4", "Bb3", "G4"], ["Bb4", "Eb3"], ["C5", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["F4", "Eb3"], ["Bb4", "Bb3", "G4"], ["D5", "Bb3", "G4"], ["Eb5", "Eb3"], ["D5", "Bb3", "G4"], ["C5", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["C5", "Ab2"], ["D5", "Ab3", "Eb4"], ["Eb5", "Ab3", "Eb4"], ["F5", "Eb3"], ["Eb5", "Bb3", "G4"], ["D5", "Bb3", "G4"], ["C5", "Eb3"], ["Bb4", "Bb3", "G4"], ["Bb4", "Eb3"], ["G4", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["Ab4", "Eb3"], ["G4", "Bb3", "G4"], ["Ab4", "Bb3", "G4"], ["Bb4", "Eb3"], ["C5", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["F4", "Eb3"], ["Bb4", "Bb3", "G4"], ["D5", "Bb3", "G4"], ["Eb5", "Eb3"], ["D5", "Bb3", "G4"], ["C5", "Bb3", "G4"], ["Bb4", "Bb3", "G4"]]
      guides: false
      tempo: 52
    followup_cleffy: >
      That.
      That was a complete Chopin Nocturne, played by you.
      A piece concert pianists spend years on. In your hands today.

  - id: 16
    mode: play
    type: with_all_the_expression
    figure: "Same score. Dynamic and rubato marks drawn in. Linger bracket over F5 in section B, over the Eb5 in section A phrase 2. Pedal flicks at every bar change. Dynamic p at start, cresc to the F5, dim back to pp. Metronome 50."
    cleffy: >
      One more pass. Everything you have.
      Sing the peaks. Rock the bass. Flick the pedal. Soft throughout except the climb to F.
      This is the one.
    interaction:
      type: song
      sequence: [["Bb4", "Eb3"], ["G4", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["Ab4", "Eb3"], ["G4", "Bb3", "G4"], ["Ab4", "Bb3", "G4"], ["Bb4", "Eb3"], ["C5", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["F4", "Eb3"], ["Bb4", "Bb3", "G4"], ["D5", "Bb3", "G4"], ["Eb5", "Eb3"], ["D5", "Bb3", "G4"], ["C5", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["C5", "Ab2"], ["D5", "Ab3", "Eb4"], ["Eb5", "Ab3", "Eb4"], ["F5", "Eb3"], ["Eb5", "Bb3", "G4"], ["D5", "Bb3", "G4"], ["C5", "Eb3"], ["Bb4", "Bb3", "G4"], ["Bb4", "Eb3"], ["G4", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["Ab4", "Eb3"], ["G4", "Bb3", "G4"], ["Ab4", "Bb3", "G4"], ["Bb4", "Eb3"], ["C5", "Bb3", "G4"], ["Bb4", "Bb3", "G4"], ["F4", "Eb3"], ["Bb4", "Bb3", "G4"], ["D5", "Bb3", "G4"], ["Eb5", "Eb3"], ["D5", "Bb3", "G4"], ["C5", "Bb3", "G4"], ["Bb4", "Bb3", "G4"]]
      guides: false
      tempo: 50

  - id: 17
    mode: hear
    type: pre_check
    figure: "Banner — Mid-boss mastery check."
    cleffy: >
      Five quick ones. Mid-boss — take your time.

  - id: 18
    mode: see
    type: reflection
    figure: "A small gallery of every piece in your hands so far. Tier 1: Happy Birthday. Tier 2: Für Elise theme. Tier 3: Clair de Lune opening. Tier 4: Moonlight opening, Prelude in C, Nocturne phrase. Tier 5 so far: Bach Invention. And — at the top, glowing — the Nocturne complete."
    cleffy: >
      Look back at Act 40.
      Melody as speech — you read phrases like sentences.
      Rubato — you borrow time and pay it back.
      Left hand as guitar — pinky deep, strum up, rock.
      Pedal by ear — mud tells you when to lift.
      Four tools. One piece tonight.
      Two hundred lessons. A complete Nocturne. That's real.

  - id: 19
    mode: see
    type: whats_next
    figure: "Pyramid preview. Tier 5 midway flag planted. Ahead: L201-225. Four small thumbnails — 'Half-pedal,' 'Voicing,' 'Arabesque,' 'Clair de Lune (full).'"
    cleffy: >
      You are halfway through Tier 5. Not done.
      Next — pedal gets finer. Half-pedal, flutter, syncopated. Subtle color.
      Voicing — thumb melodies, inner melodies, left-hand tunes.
      Debussy's Arabesque. Schumann's Träumerei. Grieg's Arietta.
      Then, at 225 — the real tier boss. Clair de Lune, all of it. The one you started at 125.
      But not today. Today was its own summit.

  - id: 20
    mode: see
    type: wrap
    figure: "Celebration card — LESSON 200 · NOCTURNE COMPLETE 👑. Cleffy at a candlelit piano, moon out the window, a page of Chopin sheet music on the stand. A small 200 star on the corner."
    cleffy: >
      Lesson 200.
      You play a complete Chopin Nocturne. Simplified, yes. But the whole piece. Start to finish.
      Two hundred lessons ago, you learned what a staff was.
      Tonight, you speak Chopin.
      Halfway there. Rest up. Tier 5 keeps going when you're ready.

practice_this_week:
  real_piano:
    - "The full Nocturne, once a day. Very slow. All four tools on — speech-shape, rubato, wide bass, pedal by ear."
    - "Play it for someone you care about. Turn the lights down. Tell them it's Chopin, 1832, and he was twenty when he wrote it."
    - "Find a concert recording — Rubinstein, Pollini, Horowitz. Listen once with eyes closed. Mark the lingers and the landings. You do this already, in a smaller way."
    - "Revisit lesson 145's phrase. Notice how small it feels now."
  virtual_only:
    - "Replay pages 14, 15, 16 — the three full-piece passes. One with guides, one without, one with all the expression."
  estimated_time: "20 min/day this week — celebrate"

mastery_check:
  sections:
    see:
      pass_threshold: 3
      questions:
        - figure: "Three boxes labeled A, B, A"
          prompt: "What form is the Nocturne in?"
          options: ["Verse-chorus-verse", "A-B-A — ternary", "Through-composed"]
          correct: 1
        - figure: "The F5 at the peak of the B section, with a hairpin swelling into it"
          prompt: "What is special about the F?"
          options: ["It's the highest note of the piece", "It's the shortest note", "It's the quietest"]
          correct: 0
        - figure: "A key signature with three flats"
          prompt: "What key is this Nocturne in?"
          options: ["B-flat major", "E-flat major", "A-flat major"]
          correct: 1
        - figure: "A left-hand bass note followed by a chord a 10th above"
          prompt: "What's the nickname for this pattern?"
          options: ["Alberti bass", "Wide bass — 'guitar' bass", "Octave bass"]
          correct: 1
        - figure: "A pedal flick right after a new bass note lands"
          prompt: "When do you change pedal?"
          options: ["A beat before the new bass", "Right after the new bass lands", "Never — one pedal for the whole piece"]
          correct: 1
    hear:
      pass_threshold: 2
      questions:
        - audio: "The A section played first, then the B section, then the A section again"
          prompt: "Did the opening melody return?"
          options: ["Yes — that's the A return", "No, it was all new"]
          correct: 0
        - audio: "The climb to F5 and the settle back down in the B section"
          prompt: "Where is the peak of the piece?"
          options: ["In the middle — the B section", "At the very end", "At the very start"]
          correct: 0
        - audio: "Two takes — one muddy-pedal, one clean-pedal"
          prompt: "Which one has clean pedaling?"
          options: ["The first", "The second"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play the A section — both hands, 16 notes in the RH over the wide-bass LH — slowly."
          accept: "The A section played with both hands, tempo around 54, with the RH melody legato and the LH bass-chord-chord pattern audible underneath"

remediation:
  id: "200.5"
  title: "The Nocturne, section by section"
  pages: 12
  opening_cleffy: >
    Big piece. Mid-boss. Expected to stretch you.
    Let's unstack. A section alone, both hands, very slow. Then B alone. Then the return. Then — and only then — all three strung together.
    No rush. This Nocturne has been waiting 200 years. It'll wait for you too.

completion:
  cleffy: >
    Lesson 200. Sealed.
    A complete Chopin Nocturne. Your hands. Your ear. Your time.
    Halfway through Tier 5. Halfway through the whole road.
    The moon's up. Rest tonight. Tomorrow — half-pedal, and the colors inside the sustain.
  xp: 100
  unlocks: 201
