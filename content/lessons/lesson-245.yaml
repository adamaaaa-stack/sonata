practice_this_week:
  real_piano:
    - "Play the whole movement once a day, slow. Don't push past 42 bpm this week."
    - "If a section wobbles, stop only AFTER you finish the full run. Then work that one spot. Then do a full run again."
    - "Record yourself playing the whole thing. Listen back with the score in hand. Notice the phrases that breathe. Notice the ones that don't."
    - "Listen to a complete recording of the Moonlight 1st movement once. Appreciate what you just did."
  virtual_only:
    - "Replay pages 12 and 13 — full movement with and without guides."
  estimated_time: "25 min/day this week — the biggest run you've ever done"

mastery_check:
  sections:
    see:
      pass_threshold: 3
      questions:
        - figure: "Map of the full movement: four sections labeled A, B, A', coda"
          prompt: "What is the structure of Moonlight's 1st movement?"
          options: ["One long section", "A-B-A' with a coda", "Verse-chorus"]
          correct: 1
        - figure: "Tempo marking: 40 bpm, adagio sostenuto"
          prompt: "What tempo is today's run?"
          options: ["Full speed", "Very slow — 40 bpm", "Medium"]
          correct: 1
        - figure: "Rules card: no stopping, slow, wrong notes OK, ppp at coda"
          prompt: "What should you do if you hit a wrong note?"
          options: ["Stop and restart", "Keep going — the run doesn't stop", "Go back to the previous bar"]
          correct: 1
        - figure: "The full 69-bar map with pedal markings"
          prompt: "What pedal techniques appear in the full movement?"
          options: ["Only full pedal changes", "Full changes, half-pedal, and flutter — varied by section", "No pedal at all"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Full first movement, real recording"
          prompt: "Which describes this piece?"
          options: ["A loud, fast toccata", "A slow, sustained, quiet piece with a continuous triplet engine", "A loud march"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play the entire first movement of Moonlight — all 69 bars — at 40 bpm, no stopping."
          accept: "Full 69 bars played end to end, slow, no full stops, final chord held into silence"

remediation:
  id: "245.5"
  title: "The full movement, stitched slowly"
  pages: 11
  opening_cleffy: >
    This is the biggest thing you've ever played. If it wobbled, that's expected.
    We'll slow to 36 and stitch section by section — A, then A plus B, then A plus B plus A-prime, then the whole thing with the coda.
    By the end, you will have played all sixty-nine bars in one unbroken run. That's the goal.
    No hurry.

completion:
  cleffy: >
    Act 49 — sealed. The last act boss of the whole curriculum.
    You played the complete first movement of Moonlight Sonata today. Every bar.
    Tomorrow is graduation week. Five lessons to the summit.
    Rest tonight. The moon will be out.
  xp: 30
  unlocks: 246
