# ============================================================
# LESSON 102 · Smooth chord changes
# Tier 3 · Act 21 · Low-Intermediate
# Share a finger — voice-leading from C → F → G with minimal motion.
# ============================================================
id: 102
tier: low-intermediate
act: 21
title: "Smooth chord changes"
subtitle: "Act 21 · Share a finger"
goal: "Move between chords by sharing a finger — barely moving your hand."
prereqs: [101, 100, 75]
method_focus: "play"
time_estimate_min: 13
piece_context: "You know the three shapes. Now pick the shape that keeps your hand still."
metaphor: "chords-as-handprints"
vibe: ["focused", "quiet"]

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Two hands. Left one jumps far across the keyboard between chords. Right one barely moves — one finger stays put."
    cleffy: >
      Amateurs jump. Pros glide.
      The trick is picking the inversion that shares a note with the next chord.
      Share a finger. Slide the rest.

  - id: 2
    mode: see
    type: the_goal
    figure: "Three chord progression — C, F, G. Shown as root-position blocks far apart on keyboard."
    cleffy: >
      C major. F major. G major. The three chords that build most songs.
      In root position they sit far apart. Your hand would leap every time.

  - id: 3
    mode: see
    type: find_the_shared_note
    figure: "C chord (C-E-G) and F chord (C-F-A) side by side. C note glowing in both."
    cleffy: >
      Look at C major and F major. Both contain a C.
      If F is in second inversion — C, F, A — the C sits on bottom.
      One finger stays. The others shift.

  - id: 4
    mode: play
    type: play_c_root
    figure: "Keyboard. C, E, G glowing. Fingers 1-3-5."
    cleffy: >
      Start at home. C major, root.
    interaction:
      type: sequence
      keys: [["C4","E4","G4"]]

  - id: 5
    mode: play
    type: play_f_2nd_inversion
    figure: "Keyboard. C, F, A glowing. Thumb stays on C. Middle finger slides from E to F. Pinky from G to A."
    cleffy: >
      F major, second inversion. C, F, A.
      Thumb doesn't move. Middle slides up one. Pinky slides up one.
      Tiny movements.
    interaction:
      type: sequence
      keys: [["C4","F4","A4"]]

  - id: 6
    mode: play
    type: c_to_f_glide
    figure: "Keyboard. C root then F 2nd inv. Thumb circled — it stays."
    cleffy: >
      Both in order. C root. Then F.
      Thumb stays on C the whole time.
    interaction:
      type: sequence
      keys: [["C4","E4","G4"], ["C4","F4","A4"]]

  - id: 7
    mode: see
    type: f_to_g
    figure: "F (C-F-A) and G (B-D-G) side by side. No shared note — but neighboring notes."
    cleffy: >
      F to G. No shared note.
      But G in first inversion — B, D, G — sits right next to F's shape.
      Each finger slides one key.

  - id: 8
    mode: play
    type: play_g_1st_inversion
    figure: "Keyboard. B3, D4, G4 glowing. Fingers 1-2-5."
    cleffy: >
      G major, first inversion. B, D, G.
      Thumb on B. Pointer on D. Pinky on G.
    interaction:
      type: sequence
      keys: [["B3","D4","G4"]]

  - id: 9
    mode: play
    type: f_to_g_glide
    figure: "Keyboard. F 2nd inv then G 1st inv. Arrows showing each finger sliding one step."
    cleffy: >
      F to G. Every finger moves one step down.
      C down to B. F down to D — that's a bigger one. A down to G.
      Still tiny compared to leaping.
    interaction:
      type: sequence
      keys: [["C4","F4","A4"], ["B3","D4","G4"]]

  - id: 10
    mode: play
    type: full_progression
    figure: "Keyboard. Full C → F → G → C progression. Hand stays in one zone the whole time."
    cleffy: >
      All three. C root. F second inversion. G first inversion. Back to C root.
      Your hand barely leaves its spot.
    interaction:
      type: sequence
      keys: [["C4","E4","G4"], ["C4","F4","A4"], ["B3","D4","G4"], ["C4","E4","G4"]]
    followup_cleffy: >
      Feel that? One hand position. Three chords.

  - id: 11
    mode: hear
    type: listen_smooth_vs_jumpy
    figure: "Two play buttons — A: all root position (jumpy). B: with inversions (smooth)."
    audio:
      A: "C, F, G, C all in root position — notes leap"
      B: "C, F/2nd, G/1st, C — notes glide"
    cleffy: >
      Same chords. Two versions.
      The second one sounds connected. That's voice-leading.

  - id: 12
    mode: see
    type: voice_leading_name
    figure: "Flashcard — 'Voice-leading: picking the closest shape of the next chord.'"
    cleffy: >
      The technique has a name. Voice-leading.
      Classical composers built whole careers on it.

  - id: 13
    mode: play
    type: full_progression_again
    figure: "Keyboard. Same C → F → G → C. At a slightly faster tempo."
    cleffy: >
      Once more. Cleaner. Tempo 60.
    interaction:
      type: rhythm
      sequence: [["C4","E4","G4"], ["C4","F4","A4"], ["B3","D4","G4"], ["C4","E4","G4"]]
      durations: ["quarter","quarter","quarter","quarter"]
      tempo: 60

  - id: 14
    mode: hear
    type: pre_check
    figure: "Banner."
    cleffy: >
      Three quick ones.

  - id: 15
    mode: see
    type: wrap
    figure: "Postcard — Lesson 102. One hand drawn with arrows showing tiny slides between chord shapes."
    cleffy: >
      Share a finger. Slide the rest.
      Tomorrow — left hand and right hand doing different things at the same time.

practice_this_week:
  real_piano:
    - "C → F → G → C with voice-leading. Slow. Feel the thumb staying on C from C to F."
    - "Try the same idea starting from F. Find the shared note with C."
  virtual_only:
    - "Replay pages 6, 9, 10"
  estimated_time: "8 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 1
      questions:
        - figure: "C major root (C-E-G) next to F major second inversion (C-F-A)"
          prompt: "Which note is shared between these two chords?"
          options: ["C", "E", "F"]
          correct: 0
    hear:
      pass_threshold: 1
      questions:
        - audio: "C, F/2nd, G/1st, C progression — smooth version"
          prompt: "Do the chords sound connected or jumpy?"
          options: ["Connected", "Jumpy"]
          correct: 0
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play C major root, then F major second inversion — keeping your thumb on C."
          accept: "C-E-G then C-F-A"

remediation:
  id: "102.5"
  title: "One chord change at a time"
  pages: 8
  opening_cleffy: >
    Voice-leading is new. Let's take one pair of chords, then the next pair, and build the progression slowly.

completion:
  cleffy: >
    Smooth changes. Shared fingers.
    Tomorrow — hands doing different things.
  xp: 18
  unlocks: 103
