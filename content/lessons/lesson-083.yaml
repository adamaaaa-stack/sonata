# ============================================================
# LESSON 83 · Crossing over
# Tier 3 · Act 17 · Low-intermediate
# The opposite of thumb-under. Finger reaches over the thumb.
# ============================================================
id: 83
tier: low-intermediate
act: 17
title: "Crossing over"
subtitle: "Act 17 · Fingering"
goal: "Pass a longer finger over the thumb to continue a scale in the other direction."
prereqs: [82, 81, 75]
method_focus: "play"
time_estimate_min: 13
piece_context: "Thumb-under was for going up with the right hand. Crossing-over is the reverse — going down, or going up with the left hand."
metaphor: "hand-as-choreography"
vibe: ["focused", "gentle"]

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Staff: C major scale descending, C5 down to C4. Hand hovering with fingers labeled."
    cleffy: >
      Yesterday, thumb-under. Going up.
      Today, the reverse. Crossing over. Going down.

  - id: 2
    mode: see
    type: the_problem_down
    figure: "Hand at top of scale — pinky on high C. Fingers 5-4-3-2-1 descending to F. Arrow showing need to keep going."
    cleffy: >
      RH descending. Pinky on high C. 5, 4, 3, 2, 1 lands you on F.
      Still need to play E, D, C. Thumb's already used. Now what?

  - id: 3
    mode: see
    type: the_cross_over
    figure: "Hand diagram. Thumb holding F. Middle finger arching up and OVER the thumb to reach E."
    cleffy: >
      The fix: middle finger reaches OVER the thumb.
      The thumb stays low — the longer finger crosses above it to the next key.
      Opposite direction from yesterday. Same idea.

  - id: 4
    mode: see
    type: metaphor
    figure: "Side view of a hand. Thumb low like a beam. Finger 3 arching over it like a leg stepping over a log."
    cleffy: >
      Thumb-under was a boat under a bridge.
      Crossing-over is a leg stepping over a low log. Thumb stays. Finger goes over.

  - id: 5
    mode: hear
    type: listen_descending
    figure: "Play button. C major scale descending, RH."
    audio:
      A: "C major scale descending, RH, smooth"
    cleffy: >
      Listen. Scale coming down. No gap where the finger crossed.

  - id: 6
    mode: see
    type: the_fingering
    figure: "Staff: C5-B4-A4-G4-F4-E4-D4-C4 with fingering 5-4-3-2-1-3-2-1. The 1→3 boundary highlighted."
    cleffy: >
      Fingering for RH C major descending.
      5, 4, 3, 2, 1 — cross 3 over — 3, 2, 1.
      The cross happens between F and E.

  - id: 7
    mode: play
    type: first_segment
    figure: "Keyboard. C5-B4-A4-G4-F4 glowing. Fingers 5-4-3-2-1."
    cleffy: >
      First five notes down. Pinky on high C.
      5, 4, 3, 2, 1. Land on F with the thumb.
    interaction:
      type: sequence
      keys: ["C5","B4","A4","G4","F4"]

  - id: 8
    mode: play
    type: the_cross
    figure: "Keyboard. Thumb on F4. Middle finger crossing over to E4."
    cleffy: >
      Now the cross. Thumb on F. Middle finger arches over, lands on E.
      Just those two. F with thumb, then E with finger 3.
    interaction:
      type: sequence
      keys: ["F4","E4"]

  - id: 9
    mode: play
    type: full_descending
    figure: "Keyboard. Full C major scale descending. Fingering 5-4-3-2-1-3-2-1 labeled."
    cleffy: >
      Full scale, top to bottom. Slow.
      5, 4, 3, 2, 1 — cross — 3, 2, 1.
    interaction:
      type: rhythm
      sequence: ["C5","B4","A4","G4","F4","E4","D4","C4"]
      durations: ["quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter"]
      tempo: 60

  - id: 10
    mode: see
    type: lh_version
    figure: "Bass staff: C3-D3-E3-F3-G3-A3-B3-C4 ascending. Fingering 5-4-3-2-1-3-2-1."
    cleffy: >
      Left hand does the same thing — but going up.
      LH C major ascending: pinky on low C. 5, 4, 3, 2, 1 — then middle finger crosses over — 3, 2, 1.
      Cross happens between F and G.

  - id: 11
    mode: play
    type: lh_scale
    figure: "Keyboard. LH C major scale ascending. Fingering 5-4-3-2-1-3-2-1."
    cleffy: >
      Left hand, ascending. Pinky on low C. Cross 3 over the thumb between F and G.
    interaction:
      type: rhythm
      sequence: ["C3","D3","E3","F3","G3","A3","B3","C4"]
      durations: ["quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter"]
      tempo: 60
    followup_cleffy: >
      Same trick. Different hand. Different direction.

  - id: 12
    mode: play
    type: rh_both_ways
    figure: "Keyboard. RH C major scale up and down. Guides on. Tempo 75."
    cleffy: >
      RH — up and back down. Thumb-under going up. Cross-over coming down.
    interaction:
      type: song
      sequence: ["C4","D4","E4","F4","G4","A4","B4","C5","B4","A4","G4","F4","E4","D4","C4"]
      guides: true
      tempo: 75

  - id: 13
    mode: play
    type: at_tempo
    figure: "Keyboard. RH scale up and down. No guides. Tempo 90."
    cleffy: >
      Faster. No guides.
    interaction:
      type: song
      sequence: ["C4","D4","E4","F4","G4","A4","B4","C5","B4","A4","G4","F4","E4","D4","C4"]
      guides: false
      tempo: 90

  - id: 14
    mode: hear
    type: pre_check
    figure: "Banner."
    cleffy: >
      Three quick ones.

  - id: 15
    mode: see
    type: wrap
    figure: "Postcard — Lesson 83. A hand with finger 3 arching over the thumb."
    cleffy: >
      Crossing over. Thumb stays low, finger steps over.
      Tomorrow — one more fingering trick. Same key, swap fingers.

practice_this_week:
  real_piano:
    - "RH C major scale up and down. Focus on both moves — thumb-under going up, cross-over coming down."
    - "LH C major scale up only. Focus on the cross between F and G."
    - "Play the scale slow enough that you don't hear a gap at either crossing point."
  virtual_only:
    - "Replay pages 7-9 (cross-over drill)"
  estimated_time: "10 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Staff RH C major descending with fingering"
          prompt: "What finger crosses over the thumb in RH descending?"
          options: ["2", "3", "5"]
          correct: 1
        - figure: "Hand with thumb low and finger 3 arching over"
          prompt: "What's this move?"
          options: ["Thumb-under", "Crossing over", "Finger-slide"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Smooth descending C major scale"
          prompt: "Smooth or choppy?"
          options: ["Smooth", "Choppy"]
          correct: 0
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play C-B-A-G-F-E. Cross finger 3 over the thumb between F and E."
          accept: "Six notes descending with cross-over executed"

remediation:
  id: "83.5"
  title: "Crossing over, slower"
  pages: 7
  opening_cleffy: >
    Same idea as yesterday, flipped.
    Let's isolate the cross and slow it right down.

completion:
  cleffy: >
    Cross-over, done. Scales flow both directions.
    Tomorrow: finger substitution. The quietest trick of all.
  xp: 20
  unlocks: 84
