    - "The coda, every day. Very slow. Very quiet. Pianissimo."
    - "Play bars 60 into 61. Hear how the return flows into the coda — no seam."
    - "Let the last chord of bar 69 ring. Don't rush to lift the pedal. Count five seconds of silence."
  virtual_only:
    - "Replay pages 9, 10, 11, and 12."
  estimated_time: "12 min/day"

