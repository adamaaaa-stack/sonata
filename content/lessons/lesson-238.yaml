practice_this_week:
  real_piano:
    - "Bars 13-23 every day. Slow. Don't join them to bars 1-12 yet — we do that at the boss."
    - "Pay attention to the E major moment around bars 17-19. Hear how it brightens."
    - "Pedal cleanly. No blur between bars. If it muddies, slow down further."
  virtual_only:
    - "Replay pages 5, 7, 9, 11 — each small section, then the full run."
  estimated_time: "15 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Key path: C#m → E major → B major → C#m"
          prompt: "What does 'modulation' mean in this passage?"
          options: ["Playing louder", "Moving briefly to new keys", "Changing tempo"]
          correct: 1
        - figure: "Relative major / minor diagram — C# minor and E major share a key signature"
          prompt: "What is the relative major of C-sharp minor?"
          options: ["C major", "E major", "G major"]
          correct: 1
        - figure: "Bars 13-23 with pp throughout"
          prompt: "How loud should the modulation passage be?"
          options: ["Crescendo to forte", "Stay pianissimo", "Accent the new keys"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Bars 13-15 (still minor) then bars 17-19 (briefly E major)"
          prompt: "Which clip sounds a little brighter?"
          options: ["First", "Second"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play bars 20-23 — the return toward C-sharp minor — at 46 bpm, pedal per bar."
          accept: "Bars 20-23 of Moonlight, both hands, pedaled"

remediation:
  id: "238.5"
  title: "Bars 13-23, three pieces at a time"
  pages: 9
  opening_cleffy: >
    New material. First modulation. Honest — this is the biggest step since lesson 175.
    We'll take bars 13-15, 16-19, and 20-23 each alone. Slower. Hands apart first.
    Don't force the full stretch until each feels steady.

completion:
  cleffy: >
    Eleven new bars. First modulation in your hands.
    Tomorrow — the color of C-sharp minor itself. Why this key. Why this mood.
  xp: 22
  unlocks: 239
