    mode: see
    type: hook
    figure: "Cleffy at the piano. A window behind him that was closed in previous lessons now cracked open. Banner: bars 13-23 · new ground."
    cleffy: >
      Real new ground today.
      Eleven bars. First time the piece changes color.
      The window cracks open.

  - id: 2
    mode: see
    type: what_changes
    figure: "Two columns. Left — 'so far (bars 1-12)': all C-sharp minor, same harmonic world. Right — 'bars 13-23': touches E major (relative major, brighter), touches B major (dominant of E). Same engine underneath."
    cleffy: >
      Bars 1 through 12 lived in one key. C-sharp minor.
      Bars 13 through 23 travel.
      The music brightens through B major and touches F-sharp minor before resolving.
      The engine keeps rolling. The colors shift.

