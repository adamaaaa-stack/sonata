      guides: false
      tempo: 58

  - id: 16
    mode: hear
    type: pre_check
    figure: "Banner — mastery check. The last one before graduation."
    cleffy: >
      Three quick ones. The last check before the big day.

  - id: 17
    mode: see
    type: sleep_on_it
    figure: "A window. A moon rising. A piano in shadow. Caption: 'let it settle.'"
    cleffy: >
      One more piece of advice.
      Don't practice more tonight.
      The piece is in your hands. Your fingers know it.
      More hours tonight won't help. Sleep helps.
      Your brain consolidates the piece overnight. That's real. That's documented.
      Rest is practice now.

  - id: 18
    mode: see
    type: wrap
    figure: "Cleffy holding the closed score of Moonlight. A trophy outline in the background, dim. Caption: 'tomorrow.'"
    cleffy: >
      Dress rehearsal. Done.
      You recorded yourself playing Moonlight Sonata, first movement, at tempo, no stopping.
      Tomorrow — graduation.
      Two hundred and forty-nine lessons behind you.
      One to go.

practice_this_week:
  real_piano:
    - "Tonight — don't practice. Really. Rest the hands. Rest the brain."
    - "Tomorrow, before graduation — one warmup run at slow tempo. No more. Save the energy."
    - "If tomorrow is the day — wear something you like. Light the room the way you want it. Make it real."
  virtual_only:
    - "Do not replay pages 10 or 15. The piece is done cooking. Let it rest."
  estimated_time: "20 min today. 0 min tonight. 10 min tomorrow."

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "A record button next to a pair of headphones"
          prompt: "Why record the dress rehearsal?"
          options: ["To prove it was good", "To hear yourself as an outsider would", "To post online"]
          correct: 1
        - figure: "A rulebook — one take, no stopping, record, listen"
          prompt: "What's rule number two?"
          options: ["One take", "No stopping", "Listen back"]
          correct: 1
        - figure: "Three columns — held up, needs one fix, let go"
          prompt: "After the take, how many things do you fix?"
          options: ["All of them", "One", "None"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "A recording played back after a performance"
          prompt: "What's the debrief question that matters most?"
          options: ["Were there any wrong notes?", "Did it sound like music?", "Was it perfect?"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Run the full Moonlight once, recorded if possible, no stopping."
          accept: "All 69 bars, one take, pulse held"

remediation:
  id: "249.5"
  title: "Dress rehearsal, redone"
  pages: 6
  opening_cleffy: >
    If the first take fell apart — that's information. No judgment.
    Let's slow it down. Run section A alone, recorded. Then B. Then A'. Then stitch them together with no breaks.
    Graduation is tomorrow. Your piece is ready. Your head will catch up.

completion:
  cleffy: >
    Dress rehearsal — done.
    Tomorrow is lesson 250.
    Tomorrow is graduation.
    Sleep well. Wake up ready.
    I'll see you there.
  xp: 22
  unlocks: 250
