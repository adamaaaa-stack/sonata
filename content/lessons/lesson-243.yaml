practice_this_week:
  real_piano:
    - "Bars 43-60, very slow. Don't push past 42 bpm."
    - "Play bars 1-8, then immediately play bars 43-50. Hear the two versions of the theme next to each other."
    - "Play bars 24-60 without stopping, once a day. Middle into return."
  virtual_only:
    - "Replay pages 8, 9, 11, 12, and 13."
  estimated_time: "15 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Comparison of bars 1-8 and bars 43-50"
          prompt: "What returns at bar 43?"
          options: ["A new melody never heard before", "The opening theme, with deeper bass and subtle harmonic shifts", "The coda"]
          correct: 1
        - figure: "Harmonic arc showing opening → middle → return"
          prompt: "Why does the return feel like coming home?"
          options: ["It's louder", "The ear recognizes the shape after the middle section's wandering", "It's in a different key"]
          correct: 1
        - figure: "Two scores side by side — bars 1-8 vs bars 43-50"
          prompt: "How does the return differ from the opening?"
          options: ["Identical in every way", "Same shape, slightly different harmony and bass motion", "Completely unrelated"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Bars 1-8 then bars 43-50 back to back"
          prompt: "What's true of these two passages?"
          options: ["Completely different tunes", "Same theme, second version feels like coming home", "Same tune, identical"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play bars 43-50 — the return of the main theme — at 46 bpm, with pedal."
          accept: "Eight bars of theme return, LH octaves and walks, RH engine with dotted melody on top"

