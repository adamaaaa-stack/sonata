    mode: see
    type: why_it_feels_like_home
    figure: "Pyramid diagram. Opening (bright), middle (wandering), return (settled). Arrows showing emotional arc. Caption: 'after the journey, the theme feels like a resolution.'"
    cleffy: >
      Why it feels like home.
      You heard the theme. You left it behind for nineteen bars. Now it's back.
      The ear relaxes. It knows this place. Even the small differences feel right.

