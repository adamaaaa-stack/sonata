    mode: see
    type: hook
    figure: "Cleffy at the piano. Map behind him — bars 1-42 lit gold. Bars 43-60 dim, pulsing. Banner: 'THE THEME RETURNS.'"
    cleffy: >
      The main theme returns.
      You know this shape. You played it at lesson 170. And 171. And again at 175.
      Now it comes back — different. You're different too.

  - id: 2
    mode: see
    type: the_return
    figure: "Two scores, side by side. Left — bars 1-8 (the opening). Right — bars 43-50 (the return). Shapes match but harmony differs slightly."
    cleffy: >
      A side by side.
      Left — the opening. The theme you've known for seventy-three lessons.
      Right — the return. Same shape. Different colors. The piece has been somewhere.

  - id: 3
    mode: hear
    type: listen_comparison
    figure: "Three buttons. A: bars 1-8 opening. B: bars 43-50 return. C: them back-to-back."
    audio:
      A: "Moonlight, opening 8 bars"
      B: "Moonlight, bars 43-50 — the return of the theme"
      C: "Both, played back to back with a short pause"
    cleffy: >
      Listen. Same theme, twice.
      The second time feels different. Heavier. Tired. Home.
      That's what development does. The notes are similar. The meaning changes.

