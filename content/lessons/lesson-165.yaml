    mode: play
    type: chain_three_keys
    figure: "Three bars — C, G, F arpeggios back to back. Metronome 60."
    cleffy: >
      Three keys in a row. C, G, F.
      One bar each. Don't stop between.
    interaction:
      type: rhythm
      sequence: ["C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","G4","B4","D5","G4","B4","D5","G4","B4","D5","G4","B4","D5","F4","A4","C5","F4","A4","C5","F4","A4","C5","F4","A4","C5"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 60

  - id: 14
    mode: play
    type: final_run_c_with_feel
    figure: "Four bars of C-E-G arpeggios. Metronome 60. Label: like Moonlight."
    cleffy: >
      Final run. Four bars. C arpeggio. Soft.
      Imagine the pedal. Imagine the moonlight.
    interaction:
      type: song
      sequence: ["C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4"]
      guides: false
      tempo: 60
    followup_cleffy: >
      Four bars of rolling triplet arpeggios. At tempo.
      That's Act 33. Sealed.

  - id: 15
    mode: hear
    type: pre_check
    figure: "Banner — Act 33 boss mastery check."
    cleffy: >
      Four quick ones. Take your time.

  - id: 16
    mode: see
    type: wrap
    figure: "Celebration card — ACT 33 COMPLETE 🎯. Cleffy next to a piano with moonlight streaming in. Map of acts: 33/50 complete."
    cleffy: >
      Act 33. Closed.
      Triplets, deeper. Shapes known. Fingering burned in. Pedal combined. Five keys under your hand.
      You are now holding the engine of the Moonlight Sonata in your two hands.
      Next act — C-sharp minor. The actual key. The actual piece. It starts at lesson 170.

practice_this_week:
  real_piano:
    - "Cycle through all five keys every day — C, G, F, D, A. One bar of triplet arpeggios each. Metronome 60."
    - "Try playing C arpeggios with pedal held through each bar. That's Moonlight waiting."
    - "Push the tempo up one notch each day. 60, 65, 70. Stop the moment it gets rough."
  virtual_only:
    - "Replay pages 5-9 (all five keys), then 13 and 14."
  estimated_time: "12 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Five triplet arpeggios: C, G, F, D, A"
          prompt: "Which fingering works for all five?"
          options: ["1, 2, 3", "1, 3, 5", "2, 3, 4"]
          correct: 1
        - figure: "D-F#-A arpeggio"
          prompt: "What's the middle note?"
          options: ["F-natural", "F-sharp", "E"]
          correct: 1
        - figure: "A-C#-E arpeggio"
          prompt: "Which finger lands on a black key?"
          options: ["Thumb (1)", "Middle (3)", "Pinky (5)"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "C arpeggio and G arpeggio, one after the other"
          prompt: "Same key or different keys?"
          options: ["Same", "Different"]
          correct: 1
        - audio: "One bar of D-F#-A arpeggios at 60 bpm"
          prompt: "Which arpeggio is this?"
          options: ["C", "G", "D", "F"]
          correct: 2
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play one bar of C-E-G triplet arpeggios at 60 bpm, fingers 1-3-5."
          accept: "Four C-E-G triplet groups at 60 bpm"

remediation:
  id: "165.5"
  title: "Drill, one key at a time"
  pages: 11
  opening_cleffy: >
    Five keys is a lot.
    We'll walk them one by one. Spend a full minute on each before moving on.
    By the end, all five will feel like the same shape.

completion:
  cleffy: >
    Act 33 sealed. You have the triplet arpeggio — in five keys, at tempo, with pedal.
    Ten lessons from now — Moonlight Sonata, bars 1 through 4.
    Keep rolling.
  xp: 30
  unlocks: 166
