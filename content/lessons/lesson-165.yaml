# ============================================================
# LESSON 165 · Triplet arpeggio drill
# Tier 4 · Act 33 · Intermediate · ACT BOSS 🎯
# See, hear, play — at tempo. Five keys: C, G, F, D, A.
# A DRILL boss. No piece. Like L20 or L40.
# ============================================================
id: 165
tier: intermediate
act: 33
title: "Triplet arpeggio drill"
subtitle: "Act 33 · Triplets deeper"
goal: "See, hear, and play 3-note triplet arpeggios in five keys — C, G, F, D, A — at gradually rising tempo."
prereqs: [161, 162, 163, 164]
method_focus: "combine"
time_estimate_min: 16
piece_context: "Act 33 boss. Not a piece today — a drill. Same shape you know, moved to five home keys. See it, hear it, play it, at rising tempo. When you close this lesson, you have the technical vocabulary for Moonlight. Act 34 builds C-sharp minor on top of it. Then L170 is the first four bars of the real sonata."
metaphor: "moonlight-engine"
vibe: ["focused", "serious", "triumphant"]
is_act_boss: true

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy in front of a banner — ACT 33 BOSS. Five colored circles labeled C, G, F, D, A. Three-note arpeggios stacked above each."
    cleffy: >
      Act 33 boss.
      Not a piece today. A drill.
      Same triplet arpeggio shape. Five different homes. See, hear, play.

  - id: 2
    mode: see
    type: the_five_keys
    figure: "Five staves stacked. Top to bottom: C (C-E-G), G (G-B-D), F (F-A-C), D (D-F#-A), A (A-C#-E). Each shown as a triplet arpeggio."
    cleffy: >
      Five keys. Five arpeggios. All rising triplets.
      C — C, E, G.
      G — G, B, D.
      F — F, A, C.
      D — D, F-sharp, A.
      A — A, C-sharp, E.
      Two of them have a sharp. The others are all white.

  - id: 3
    mode: see
    type: same_fingering
    figure: "Keyboard showing all five arpeggios. Each one labeled 1-3-5. Caption: same three fingers, every key."
    cleffy: >
      The fingering never changes.
      One, three, five. Thumb, middle, pinky.
      Same hand shape. Different keys.

  - id: 4
    mode: hear
    type: hear_all_five
    figure: "Five play buttons — one per key. Each plays one bar of triplet arpeggios."
    audio:
      A: "Four C-E-G arpeggios at 60 bpm"
      B: "Four G-B-D arpeggios at 60 bpm"
      C: "Four F-A-C arpeggios at 60 bpm"
      D: "Four D-F#-A arpeggios at 60 bpm"
      E: "Four A-C#-E arpeggios at 60 bpm"
    cleffy: >
      Listen through each.
      Same shape. Different color every time.
      Notice the two with sharps — D and A — have a slightly brighter edge.

  - id: 5
    mode: play
    type: play_c
    figure: "One bar C-E-G triplet arpeggios. Metronome 55."
    cleffy: >
      Key one. C. Fingers 1, 3, 5.
    interaction:
      type: rhythm
      sequence: ["C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 55

  - id: 6
    mode: play
    type: play_g
    figure: "One bar G-B-D triplet arpeggios. Metronome 55."
    cleffy: >
      Key two. G. G, B, D. All white keys.
    interaction:
      type: rhythm
      sequence: ["G4","B4","D5","G4","B4","D5","G4","B4","D5","G4","B4","D5"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 55

  - id: 7
    mode: play
    type: play_f
    figure: "One bar F-A-C triplet arpeggios. Metronome 55."
    cleffy: >
      Key three. F. F, A, C. Also all white.
    interaction:
      type: rhythm
      sequence: ["F4","A4","C5","F4","A4","C5","F4","A4","C5","F4","A4","C5"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 55

  - id: 8
    mode: play
    type: play_d
    figure: "One bar D-F#-A triplet arpeggios. F-sharp highlighted in a different color. Metronome 55."
    cleffy: >
      Key four. D. D, F-sharp, A.
      The F is a black key now. Middle finger lands on black.
    interaction:
      type: rhythm
      sequence: ["D4","F#4","A4","D4","F#4","A4","D4","F#4","A4","D4","F#4","A4"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 55

  - id: 9
    mode: play
    type: play_a
    figure: "One bar A-C#-E triplet arpeggios. C-sharp highlighted. Metronome 55."
    cleffy: >
      Key five. A. A, C-sharp, E.
      Middle finger on black again.
    interaction:
      type: rhythm
      sequence: ["A4","C#5","E5","A4","C#5","E5","A4","C#5","E5","A4","C#5","E5"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 55

  - id: 10
    mode: hear
    type: name_that_arpeggio
    figure: "Drill banner. Five rounds — one per key. Student hears arpeggio, names the key."
    cleffy: >
      Five rounds. Which arpeggio is this?
    interaction:
      type: drill
      rounds: 5
      options: ["C", "G", "F", "D", "A"]

  - id: 11
    mode: play
    type: tempo_60
    figure: "One bar C-E-G arpeggios. Metronome 60."
    cleffy: >
      Tempo up. Sixty on the click. C arpeggio.
      Smoothness matters more than speed.
    interaction:
      type: rhythm
      sequence: ["C4","E4","G4","C4","E4","G4","C4","E4","G4","C4","E4","G4"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 60

  - id: 12
    mode: play
    type: tempo_70
    figure: "One bar G-B-D arpeggios. Metronome 70."
    cleffy: >
      Seventy. G arpeggio.
      If it gets messy — slow back down.
    interaction:
      type: rhythm
      sequence: ["G4","B4","D5","G4","B4","D5","G4","B4","D5","G4","B4","D5"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 70

