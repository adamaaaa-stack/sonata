# ============================================================
# LESSON 82 · Thumb-under
# Tier 3 · Act 17 · Low-intermediate
# The trick that lets scales keep going past five notes.
# ============================================================
id: 82
tier: low-intermediate
act: 17
title: "Thumb-under"
subtitle: "Act 17 · Fingering"
goal: "Pass the thumb under the hand to continue a scale past five fingers."
prereqs: [81, 75]
method_focus: "play"
time_estimate_min: 13
piece_context: "Five fingers. Eight notes in a scale. Something has to give. Thumb-under is the fix."
metaphor: "under-the-bridge"
vibe: ["focused", "gentle"]

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Staff: C major scale C-D-E-F-G-A-B-C ascending. Hand hovering, finger numbers visible."
    cleffy: >
      A scale has eight notes. Your hand has five fingers.
      You see the problem.
      Today, the fix. Thumb-under.

  - id: 2
    mode: see
    type: the_problem
    figure: "Hand at C position with fingers 1-2-3-4-5 on C-D-E-F-G. Notes F and A glowing above G with a question mark."
    cleffy: >
      Thumb on C. Pinky on G. That's five notes.
      The scale wants to keep going — A, B, C. But your hand is out of fingers.

  - id: 3
    mode: see
    type: the_trick
    figure: "Animated hand diagram. Thumb passing UNDER fingers 2 and 3. Arrow showing it reaching to F."
    cleffy: >
      The trick: the thumb sneaks under the hand.
      While middle finger holds E, the thumb slides under and lands on F.
      Hand keeps moving up. No gap.

  - id: 4
    mode: see
    type: under_the_bridge
    figure: "Hand drawn as an arch — fingers 2-3-4 forming a bridge. Thumb ducking under like a boat."
    cleffy: >
      Under the bridge.
      Your fingers 2, 3, 4 are the bridge. The thumb is a small boat going under.
      Quiet. Smooth. No bump.

  - id: 5
    mode: hear
    type: listen_scale
    figure: "Play button. C major scale RH ascending."
    audio:
      A: "C major scale ascending, RH, smooth"
    cleffy: >
      Listen. C major scale up to high C. Smooth — no gap where the thumb moved.
      That's thumb-under, done right.

  - id: 6
    mode: see
    type: the_fingering
    figure: "Staff: C-D-E-F-G-A-B-C with numbers 1-2-3-1-2-3-4-5 above each note. The 3→1 boundary highlighted."
    cleffy: >
      Here's the fingering for RH C major ascending.
      1, 2, 3 — then thumb under to 1 — then 2, 3, 4, 5.
      The pass happens between E and F. That's the spot.

  - id: 7
    mode: play
    type: first_three_notes
    figure: "Keyboard. C4, D4, E4 glowing. Fingers 1-2-3."
    cleffy: >
      Start small. Play C-D-E. Fingers 1, 2, 3.
      Hold E when you land.
    interaction:
      type: sequence
      keys: ["C4","D4","E4"]

  - id: 8
    mode: play
    type: the_pass
    figure: "Keyboard. E4 still held by middle finger. Thumb animating under to F4."
    cleffy: >
      Now the pass. Hold E with finger 3.
      Slide your thumb under the hand. Land on F.
      Just those two — E, then F with the thumb.
    interaction:
      type: sequence
      keys: ["E4","F4"]

  - id: 9
    mode: play
    type: full_scale_up
    figure: "Keyboard. Full C major scale. Fingering 1-2-3-1-2-3-4-5 labeled above each key."
    cleffy: >
      Full scale up. C to high C. Slow.
      Fingers 1, 2, 3 — thumb under — 1, 2, 3, 4, 5.
    interaction:
      type: rhythm
      sequence: ["C4","D4","E4","F4","G4","A4","B4","C5"]
      durations: ["quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter"]
      tempo: 60

  - id: 10
    mode: see
    type: coming_down
    figure: "Staff: C-B-A-G-F-E-D-C descending with fingers 5-4-3-2-1-3-2-1. The 1→3 boundary highlighted."
    cleffy: >
      Coming down is the mirror. Pinky on high C.
      5, 4, 3, 2, 1 — then middle finger reaches OVER the thumb to land on E — then 3, 2, 1.
      That's finger-over. Tomorrow's lesson.

  - id: 11
    mode: play
    type: scale_descending
    figure: "Keyboard. Full C major scale descending. Fingering 5-4-3-2-1-3-2-1 labeled."
    cleffy: >
      For now — just play down. Trust the fingering.
    interaction:
      type: rhythm
      sequence: ["C5","B4","A4","G4","F4","E4","D4","C4"]
      durations: ["quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter"]
      tempo: 60

  - id: 12
    mode: play
    type: up_and_down
    figure: "Keyboard. Full scale up and back down. Guides on. Tempo 70."
    cleffy: >
      Both directions. Up — thumb under between E and F. Down — finger crosses over between thumb and E.
    interaction:
      type: song
      sequence: ["C4","D4","E4","F4","G4","A4","B4","C5","B4","A4","G4","F4","E4","D4","C4"]
      guides: true
      tempo: 70
    followup_cleffy: >
      That. Eight notes with five fingers.
      The scale is whole now.

  - id: 13
    mode: play
    type: at_tempo
    figure: "Keyboard. Full scale up and down. No guides. Tempo 90."
    cleffy: >
      Faster. No guides.
    interaction:
      type: song
      sequence: ["C4","D4","E4","F4","G4","A4","B4","C5","B4","A4","G4","F4","E4","D4","C4"]
      guides: false
      tempo: 90

  - id: 14
    mode: hear
    type: pre_check
    figure: "Banner."
    cleffy: >
      Three quick ones.

  - id: 15
    mode: see
    type: wrap
    figure: "Postcard — Lesson 82. A hand arched like a bridge, thumb ducking under."
    cleffy: >
      Thumb-under. Under the bridge.
      Tomorrow — the opposite move. Crossing over.

practice_this_week:
  real_piano:
    - "C major scale, RH, slow. Up only. Focus on the thumb passing under between E and F."
    - "Hold E with finger 3, then pass the thumb under and play F — just those two notes — ten times."
    - "Whole scale up and down, slow. Don't rush the pass."
  virtual_only:
    - "Replay pages 8-9 until the pass feels smooth"
  estimated_time: "10 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Staff C-D-E-F-G-A-B-C with fingerings"
          prompt: "Between which two notes does the thumb pass under?"
          options: ["C and D", "E and F", "A and B"]
          correct: 1
        - figure: "Hand diagram — thumb underneath the other fingers"
          prompt: "What's this move called?"
          options: ["Thumb-over", "Thumb-under", "Finger-slide"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Smooth C major scale"
          prompt: "Can you hear where the thumb passed?"
          options: ["No — it's smooth", "Yes — big gap"]
          correct: 0
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play C-D-E-F ascending. Use thumb-under between E and F."
          accept: "Four notes ascending with thumb landing on F"

remediation:
  id: "82.5"
  title: "Thumb-under, slower"
  pages: 7
  opening_cleffy: >
    The pass takes practice. No shame. Slow motion helps.

completion:
  cleffy: >
    Thumb passes under. Scales go beyond five fingers.
    Tomorrow: crossing over.
  xp: 20
  unlocks: 83
