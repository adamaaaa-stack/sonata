id: 45
tier: elementary
act: 9
title: "Mary Had a Little Lamb"
subtitle: "Act 9 · One hand, one position, one song"
goal: "Read and play Mary Had a Little Lamb in C position — a full piece from one hand."
prereqs: [16, 21, 36, 41, 42, 44]
method_focus: "combine"
time_estimate_min: 14
piece_context: "You played a two-hand piece in Lesson 35. Today you play a one-handed piece — but with a real melody you'll recognize."
metaphor: "one-hand-hero"
vibe: ["gentle", "playful", "celebratory"]
is_act_boss: true
piece:
  title: "Mary Had a Little Lamb"
  notes: "E D C D E E E | D D D E G G | E D C D E E E E D D E D C"
  key_center: "C major"
  time_signature: "4/4"
  difficulty: "elementary — one hand, C position"

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy holding sheet music with Mary Had a Little Lamb at the top."
    cleffy: >
      End of Act 9. Your second act boss piece.
      Mary Had a Little Lamb. Right hand only, all in C position.
      You already know the tune.

  - id: 2
    mode: hear
    type: listen
    figure: "Play button. Sheet music of Mary Had a Little Lamb."
    audio:
      A: "Mary Had a Little Lamb performed cleanly"
    cleffy: >
      Listen. The whole thing.
      Mostly steps. A couple of skips. No leaps.

  - id: 3
    mode: see
    type: shape_overview
    figure: "Treble staff with Mary Had a Little Lamb written out. Three phrases."
    cleffy: >
      Three phrases. All in C position.
      Thumb on Middle C, pinky on G. Hand stays put the whole time.

  - id: 4
    mode: see
    type: phrase_1_analysis
    figure: "First phrase: E D C D E E E. Moves labeled: step down, step down, step up, step up, step up, repeat, repeat."
    cleffy: >
      First phrase. Mary had a little lamb.
      E, D, C, D, E, E, E.
      Starts on E, steps down to C, steps back up to E. Then holds E.

  - id: 5
    mode: play
    type: phrase_1
    figure: "Keyboard. C position. E-D-C-D-E-E-E glowing."
    cleffy: >
      Play phrase 1. Middle, pointer, thumb, pointer, middle, middle, middle.
    interaction:
      type: sequence
      keys: ["E4", "D4", "C4", "D4", "E4", "E4", "E4"]

  - id: 6
    mode: see
    type: phrase_2_analysis
    figure: "Second phrase: D D D E G G. Moves labeled."
    cleffy: >
      Second phrase. Little lamb, little lamb.
      Three Ds. Then E. Then a skip up to G. Then G again.

  - id: 7
    mode: play
    type: phrase_2
    figure: "Keyboard. D-D-D-E-G-G glowing."
    cleffy: >
      Play phrase 2. Pointer three times, middle, pinky, pinky.
    interaction:
      type: sequence
      keys: ["D4", "D4", "D4", "E4", "G4", "G4"]

  - id: 8
    mode: see
    type: phrase_3_analysis
    figure: "Third phrase: E D C D E E E E D D E D C. Longer."
    cleffy: >
      Third phrase. His fleece was white as snow.
      E D C D E E E E D D E D C.
      Same ideas as phrase 1, but longer, and ends on C.

  - id: 9
    mode: play
    type: phrase_3
    figure: "Keyboard. The full last phrase glowing."
    cleffy: >
      Play phrase 3. Follow the dots.
    interaction:
      type: sequence
      keys: ["E4", "D4", "C4", "D4", "E4", "E4", "E4", "E4", "D4", "D4", "E4", "D4", "C4"]

  - id: 10
    mode: play
    type: full_song_guided
    figure: "Full piece on staff. Keyboard below. Guides ON."
    cleffy: >
      Whole song, slow. Guides on.
    interaction:
      type: song
      sequence: ["E4","D4","C4","D4","E4","E4","E4","D4","D4","D4","E4","G4","G4","E4","D4","C4","D4","E4","E4","E4","E4","D4","D4","E4","D4","C4"]
      guides: true
      tempo: 55

  - id: 11
    mode: play
    type: full_song_free
    figure: "Full piece. No guides."
    cleffy: >
      No guides. Read and play.
    interaction:
      type: song
      sequence: ["E4","D4","C4","D4","E4","E4","E4","D4","D4","D4","E4","G4","G4","E4","D4","C4","D4","E4","E4","E4","E4","D4","D4","E4","D4","C4"]
      guides: false
    followup_cleffy: >
      Good. Mary Had a Little Lamb, read off the page.
      You know every move in there — just steps, one skip, and a few repeats.

  - id: 12
    mode: play
    type: at_tempo
    figure: "Full piece at a real tempo."
    cleffy: >
      Up to proper tempo now. 80 bpm.
    interaction:
      type: song
      sequence: ["E4","D4","C4","D4","E4","E4","E4","D4","D4","D4","E4","G4","G4","E4","D4","C4","D4","E4","E4","E4","E4","D4","D4","E4","D4","C4"]
      guides: false
      tempo: 80

  - id: 13
    mode: hear
    type: pre_check
    figure: "Banner — last check."
    cleffy: >
      Three quick ones.

  - id: 14
    mode: see
    type: wrap
    figure: "Celebration — ACT 9 COMPLETE. Trophy 9/10. Sheet music of Mary floating beside Cleffy."
    cleffy: >
      Act 9, done. Your second boss piece.
      Next — Act 10. Bass-staff note names, a both-hand drill, and Tier 2 keeps moving.

practice_this_week:
  real_piano:
    - "RH in C position. Play Mary Had a Little Lamb from the page, slow. Three times a day."
    - "Try it at 80 bpm once it feels steady."
    - "If you want a challenge — play it starting on G (in G position). Same shape, new notes."
  virtual_only:
    - "Replay pages 10-12 (the full-song runs)"
  estimated_time: "10 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "First phrase of Mary on staff."
          prompt: "Is this mostly steps or mostly skips?"
          options: ["Steps", "Skips"]
          correct: 0
        - figure: "Phrase 2: D-E-G."
          prompt: "The move from E to G is a..."
          options: ["Step", "Skip", "Leap"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Phrase 1 of Mary"
          prompt: "Does the phrase start and end on the same note?"
          options: ["Yes", "No"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play the first three notes of Mary Had a Little Lamb: E, D, C."
          accept: "E4 D4 C4"

remediation:
  id: "45.5"
  title: "Mary, bar by bar"
  pages: 7
  opening_cleffy: >
    Real piece — takes practice. Let's break it into the three phrases and play each one slow.

completion:
  cleffy: >
    Act 9, sealed. Two act-boss pieces behind you now.
    Tier 2 is getting real. Keep going.
  xp: 30
  unlocks: 46
