practice_this_week:
  real_piano:
    - "Bars 1-23 once a day, start to finish. No stopping. Tempo 48."
    - "If the hands stumble — keep going. That's the new rule. The piece doesn't stop; you don't stop."
    - "One day this week, record yourself playing all 23 bars. Listen back. Is the pianissimo holding? Is the modulation clear?"
    - "Listen to the full 1st movement once more, knowing you have the first third in your hands."
  virtual_only:
    - "Replay pages 8, 9, 11 — three passes through the whole chunk."
  estimated_time: "20 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 3
      questions:
        - figure: "Timeline: bars 1-23 of Moonlight, marked across the top"
          prompt: "Approximately what fraction of the first movement is this?"
          options: ["One half", "One third", "All of it"]
          correct: 1
        - figure: "Section map of bars 1-23: 1-4 engine, 5-12 melody, 13-23 modulation"
          prompt: "In which bars does the first modulation happen?"
          options: ["Bars 1-4", "Bars 5-8", "Bars 13-23"]
          correct: 2
        - figure: "Dynamic marking: pp throughout"
          prompt: "How loud should all 23 bars be?"
          options: ["Gradually louder", "Pianissimo throughout", "Medium"]
          correct: 1
        - figure: "Italian instruction: delicatissimamente"
          prompt: "What does this mean?"
          options: ["Very fast", "Most delicately", "Very loudly"]
          correct: 1
    hear:
      pass_threshold: 2
      questions:
        - audio: "A clean take of bars 1-23 vs a muddy take with no pedal changes"
          prompt: "Which one sounds right for Moonlight?"
          options: ["The clean one", "The muddy one"]
          correct: 0
        - audio: "Bars 1-4 only, then bars 17-19 only"
          prompt: "Which clip is the E major modulation?"
          options: ["First", "Second"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play bars 1 through 23 of Moonlight, start to finish, no stopping, at 48 bpm, pp."
          accept: "All 23 bars played through without stopping, pedal per bar, pianissimo"

remediation:
  id: "240.5"
  title: "Bars 1-23, chunked"
  pages: 11
  opening_cleffy: >
    Act boss — 23 bars in one breath is a lot, the first time through.
    We'll do bars 1-12 once. Then bars 13-23 once. Then string them, very slow.
    Tempo drops to 44. Pedal gets even more attention.
    There's no rush on this — it's a big step and deserves the time.

completion:
  cleffy: >
    Act 48 sealed.
    Twenty-three bars of the Moonlight Sonata. In your hands. Played through.
    One third of your graduation piece, real and ready.
    Next act — the middle of the movement. Where the piece really travels.
    Two acts. Then graduation.
    The moon's high tonight.
  xp: 30
  unlocks: 241
