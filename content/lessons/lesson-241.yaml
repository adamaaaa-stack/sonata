practice_this_week:
  real_piano:
    - "Bars 24-42, very slow. Don't push tempo. 42 bpm is plenty."
    - "Play bars 1-23 then 24-42 back-to-back once a day. Hear where the piece goes."
    - "Listen to a full recording of Moonlight 1st, focused on bars 24-42. Hear how the engine never stops."
  virtual_only:
    - "Replay pages 9, 10, 12, and 14."
  estimated_time: "15 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Map of Moonlight 1 showing bars 1-23 and 24-42"
          prompt: "What happens in bars 24-42?"
          options: ["Same as bars 1-23 repeated", "The music modulates away from C-sharp minor", "The piece ends"]
          correct: 1
        - figure: "RH engine pattern, continuous triplets across bars 24-42"
          prompt: "What about the triplet engine in this section?"
          options: ["It stops during the new melody", "It never stops — runs through the whole section", "It plays only in the bass"]
          correct: 1
        - figure: "Harmonic map showing C#m → E → G#m → F#m → back toward C#m"
          prompt: "Where does the piece head by bar 42?"
          options: ["Further from home", "Back toward C-sharp minor", "To C major"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Bars 24-42 of Moonlight, real recording"
          prompt: "What is true of this section?"
          options: ["It stays in one key", "It modulates through several keys", "It has no melody"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play bars 28-32 of the middle section — engine + new melody, at 44 bpm."
          accept: "RH triplet engine with rising melody on top, LH walking bass, four bars"

remediation:
