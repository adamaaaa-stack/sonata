pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy at the piano. A long staff stretches behind him — bars 1-23 lit gold, bars 24-42 dim and waiting. Banner: ACT 49 · BARS 24-42."
    cleffy: >
      You finished the first chunk last act. Bars 1 through 23.
      Today — the middle. Bars 24 through 42.
      Nineteen new bars. The piece leaves home for a while.

  - id: 2
    mode: see
    type: whats_different
    figure: "Two columns. Left — 'bars 1-23': C-sharp minor, dotted melody, engine. Right — 'bars 24-42': modulates away, new melody, engine keeps going."
    cleffy: >
      What changes.
      The key starts to move. C-sharp minor loosens its grip.
      A new melodic line appears. Not the opening tune — something that grows out of it.
      One thing stays — the triplet engine. It never stops. Not once.

