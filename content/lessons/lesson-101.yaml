# ============================================================
# LESSON 101 · Chord inversions (play)
# Tier 3 · Act 21 · Low-Intermediate
# Play all three shapes of the C chord — root, 1st, 2nd inversion.
# ============================================================
id: 101
tier: low-intermediate
act: 21
title: "Chord inversions (play)"
subtitle: "Act 21 · Three shapes, one chord"
goal: "Play all three shapes of the C chord — root, 1st inversion, 2nd inversion."
prereqs: [75, 89, 100]
method_focus: "play"
time_estimate_min: 13
piece_context: "You saw inversions back in Act 18. Today your hand learns all three shapes."
metaphor: "chords-as-handprints"
vibe: ["focused", "gentle"]

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Three handprints side by side on the keys. Each one a different shape. All play C major."
    cleffy: >
      Same chord. Three handprints.
      Root. First inversion. Second inversion.
      Today your hand learns all three.

  - id: 2
    mode: see
    type: review_inversions
    figure: "Staff and keyboard showing C-E-G, E-G-C, G-C-E side by side. Labeled root, 1st, 2nd."
    cleffy: >
      C major in root position — C, E, G. Lowest note is C.
      First inversion — E, G, C. Lowest note is E.
      Second inversion — G, C, E. Lowest note is G.
      Same three letters. Rearranged.

  - id: 3
    mode: see
    type: fingering_map
    figure: "Right-hand fingering shown on each shape. Root: 1-3-5. 1st inv: 1-2-5 or 1-3-5. 2nd inv: 1-3-5."
    cleffy: >
      Right-hand fingers. Keep it simple.
      Root: 1, 3, 5 — thumb, middle, pinky.
      First inversion: 1, 2, 5.
      Second inversion: 1, 3, 5.

  - id: 4
    mode: play
    type: play_root
    figure: "Keyboard. C4, E4, G4 glowing. Fingers 1-3-5."
    cleffy: >
      Root position. Press C, E, G together. One press.
    interaction:
      type: sequence
      keys: [["C4","E4","G4"]]

  - id: 5
    mode: play
    type: play_first_inversion
    figure: "Keyboard. E4, G4, C5 glowing. Fingers 1-2-5."
    cleffy: >
      First inversion. E, G, C. Thumb on E. Pinky on C.
      Press all three at once.
    interaction:
      type: sequence
      keys: [["E4","G4","C5"]]

  - id: 6
    mode: play
    type: play_second_inversion
    figure: "Keyboard. G4, C5, E5 glowing. Fingers 1-3-5."
    cleffy: >
      Second inversion. G, C, E. Thumb on G. Pinky on E.
    interaction:
      type: sequence
      keys: [["G4","C5","E5"]]

  - id: 7
    mode: hear
    type: all_three_sound
    figure: "Three play buttons — root, 1st, 2nd. Each one a block chord."
    audio:
      A: "C major root position (C-E-G)"
      B: "C major first inversion (E-G-C)"
      C: "C major second inversion (G-C-E)"
    cleffy: >
      Three versions of the same chord. Same letters.
      The one on bottom colors the sound a little differently.
      Same C major, though. All three.

  - id: 8
    mode: see
    type: why_bother
    figure: "Two keyboards. Top: hand jumping far to reach next chord. Bottom: hand staying close, using inversion."
    cleffy: >
      Why three shapes?
      So your hand doesn't have to jump far.
      The closest shape wins.

  - id: 9
    mode: play
    type: climb_up
    figure: "Keyboard. Play root, then 1st inv, then 2nd inv — going up the keyboard."
    cleffy: >
      Climb up. Root, then first, then second.
      Each one a fresh press. Don't rush.
    interaction:
      type: sequence
      keys: [["C4","E4","G4"], ["E4","G4","C5"], ["G4","C5","E5"]]

  - id: 10
    mode: play
    type: climb_down
    figure: "Keyboard. Second, first, root — going down."
    cleffy: >
      Back down. Second, first, root.
    interaction:
      type: sequence
      keys: [["G4","C5","E5"], ["E4","G4","C5"], ["C4","E4","G4"]]

  - id: 11
    mode: play
    type: any_order
    figure: "Keyboard. Order: root, 2nd, 1st, root."
    cleffy: >
      Mixed order. Root, second, first, root again.
    interaction:
      type: sequence
      keys: [["C4","E4","G4"], ["G4","C5","E5"], ["E4","G4","C5"], ["C4","E4","G4"]]
    followup_cleffy: >
      Three handprints. Your hand knows them now.

  - id: 12
    mode: see
    type: naming_rule
    figure: "Flashcard — 'The lowest note names the inversion. C on bottom = root. E on bottom = 1st. G on bottom = 2nd.'"
    cleffy: >
      One rule to remember.
      The lowest note tells you the inversion.
      C low = root. E low = 1st. G low = 2nd.

  - id: 13
    mode: hear
    type: pre_check
    figure: "Banner."
    cleffy: >
      Three quick ones.

  - id: 14
    mode: see
    type: wrap
    figure: "Postcard — Lesson 101. Three handprints drawn on a keyboard. Cleffy holding up three fingers."
    cleffy: >
      Three shapes of C. Your hand knows them.
      Tomorrow — smooth chord changes. Pick the right shape, barely move your hand.

practice_this_week:
  real_piano:
    - "Play all three inversions of C major every day. Root, 1st, 2nd. Slowly."
    - "Try the same three shapes with F major — F, A, C. Same 1-3-5 fingering."
  virtual_only:
    - "Replay pages 4-6 and 9-11"
  estimated_time: "5 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Chord E-G-C stacked on staff"
          prompt: "Which inversion?"
          options: ["Root", "First inversion", "Second inversion"]
          correct: 1
        - figure: "Chord G-C-E stacked on staff"
          prompt: "Which inversion?"
          options: ["Root", "First inversion", "Second inversion"]
          correct: 2
        - figure: "Chord C-E-G stacked on staff"
          prompt: "Which inversion?"
          options: ["Root", "First inversion", "Second inversion"]
          correct: 0
    hear:
      pass_threshold: 1
      questions:
        - audio: "C major first inversion (E-G-C)"
          prompt: "Is this the same chord as C major?"
          options: ["Yes", "No"]
          correct: 0
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play C major in first inversion — E, G, C together."
          accept: "E4, G4, C5 pressed simultaneously"

remediation:
  id: "101.5"
  title: "One shape at a time"
  pages: 7
  opening_cleffy: >
    Three handprints is a lot on one day. Let's do one shape, then the next, then the next — no rush.

completion:
  cleffy: >
    Three shapes. One chord.
    Tomorrow — gliding between chords using the one that fits.
  xp: 18
  unlocks: 102
