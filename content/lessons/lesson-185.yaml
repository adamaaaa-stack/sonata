    figure: "Cleffy in front of a harpsichord. A full score of the Invention open behind him. Banner: ACT 37 BOSS — INVENTION No. 1, COMPLETE."
    cleffy: >
      Act thirty-seven boss.
      Bach Invention No. 1. All of it.
      Twenty-one bars. Two voices. Both hands.

  - id: 2
    mode: see
    type: honest_framing
    figure: "Two boxes. Left: 'what today IS NOT — playing Bach's exact score, every inner note.' Right: 'what it IS — the full arc of his piece, simplified shapes, both hands, moderato.'"
    cleffy: >
      Honesty first.
      What this is — the full journey of the piece. Twenty-one bars of shapes, both hands.
      What this is not — every sixteenth note Bach wrote. That's your next year of work.
      The arc. The whole arc.

  - id: 3
    mode: see
    type: the_map
    figure: "21 boxes in a row, labeled bars 1-21. Colored regions: EXPOSITION (1-6) · DEVELOPMENT (7-14) · RETURN (15-21). Arrows for imitation across bars."
    cleffy: >
      A map. Three parts.
      Exposition — bars one through six. Subject introduced, both hands answer.
      Development — seven through fourteen. Subject moves through keys. Inverted.
      Return — fifteen through twenty-one. Back to C. Strong finish.

  - id: 4
    mode: hear
    type: listen_full
    figure: "Play button. Caption: full simplified version, moderato, both voices."
    audio:
      A: "The simplified full Invention No. 1 — 21 bars at 88 bpm, both voices, melodic shapes only. Start in C, middle section in G and D minor, return to C."
    cleffy: >
      Listen once. All the way through.
      Don't read along. Just feel the journey.
      It starts home. It wanders. It comes home.

  - id: 5
    mode: see
    type: section_1_exposition
    figure: "Grand staff. Bars 1-6. RH subject, then LH subject, then continuing motion in both."
    cleffy: >
      Section one. Exposition.
      Right hand announces the subject. Left hand copies in bar two.
      Both keep moving together through bar six.

