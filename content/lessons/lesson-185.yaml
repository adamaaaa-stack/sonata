practice_this_week:
  real_piano:
    - "Play the full simplified Invention every day this week. Start at 72, work up to 96. If any section cracks, slow it, rebuild, try again."
    - "Listen to a professional recording of BWV 772 — any version. You now understand what's happening in every bar. You'll hear the subject move. You'll hear the inversion. That's literacy."
    - "If you're feeling bold — find the real Bach score and read through it slowly. Don't try to play it. Just follow along while the recording plays."
  virtual_only:
    - "Replay pages 12, 13, 14 — the full piece at three tempos"
    - "Replay page 14 once a day — the performance version, no guides"
  estimated_time: "15 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "The 21-bar map: bars 1-6, 7-14, 15-21"
          prompt: "What are the three sections of the Invention?"
          options: ["Slow, fast, slow", "Exposition, development, return", "Intro, chorus, outro"]
          correct: 1
        - figure: "Bar 7 — subject starting on G instead of C"
          prompt: "What has happened to the subject in the development?"
          options: ["It's been moved to a new key", "It's been repeated exactly", "It's been removed"]
          correct: 0
        - figure: "Bar 21 — final C major chord with a fermata"
          prompt: "Why is there a fermata on the last chord?"
          options: ["It's a mistake", "To hold the final resolution — the piece ends here", "To indicate silence"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "The full simplified Invention at 88 bpm"
          prompt: "Roughly how many sections does the piece have?"
          options: ["One", "Three — start, middle, end", "Seven"]
          correct: 1
        - audio: "The subject inverted vs the subject original"
          prompt: "Which version appears in the development section?"
          options: ["Original only", "Inverted version — among others"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play the full Invention No. 1, simplified, at 88 bpm or higher, both hands."
          accept: "all 21 bars played end to end, both voices, at or near moderato"

remediation:
  id: "185.5"
  title: "Invention, section by section"
