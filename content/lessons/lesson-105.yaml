pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy holding Twinkle Twinkle sheet music. A grand staff behind him. Act 21 boss banner."
    cleffy: >
      Act 21 boss.
      Twinkle Twinkle. Full melody in your right hand. Full harmony underneath.
      Everything from this act lands here.

  - id: 2
    mode: hear
    type: listen_to_piece
    figure: "Big play button. Preview of the whole arrangement."
    audio:
      A: "Twinkle Twinkle, both hands, RH melody with LH block chords, clean"
    cleffy: >
      Listen. Melody you know. Chords holding it up.
      The harmony is what makes it sound like real piano music, not a one-finger tune.

  - id: 3
    mode: see
    type: the_melody
    figure: "Treble staff. Full Twinkle melody: C C G G A A G | F F E E D D C."
    cleffy: >
      The melody. Same one you knew before you could read.
      C, C, G, G, A, A, G. Twinkle twinkle little star.
      F, F, E, E, D, D, C. How I wonder what you are.

  - id: 4
    mode: see
    type: the_harmony
    figure: "Grand staff. Melody notes above. Below, chord letters written out bar by bar: C | C | F | C || F | C | G | C."
    cleffy: >
      The chords underneath. C. C. F. C. Then F. C. G. C.
      The three chords you've been working with all act.

  - id: 5
    mode: see
    type: inversion_choices
    figure: "Flashcard — 'C root. F 2nd inv. G 1st inv.' — same choices from lesson 102."
    cleffy: >
      You've met these inversions before.
      C root. F in second inversion. G in first inversion.
      Your left hand barely moves the whole song.

  - id: 6
    mode: play
    type: rh_phrase_1
    figure: "Treble staff. First phrase highlighted. C C G G A A G."
    cleffy: >
      Right hand, first phrase. Slow.
      C, C, G, G, A, A, G.
    interaction:
      type: sequence
      keys: ["C4","C4","G4","G4","A4","A4","G4"]

  - id: 7
    mode: play
    type: rh_phrase_2
    figure: "Treble staff. Second phrase. F F E E D D C."
    cleffy: >
      Right hand, second phrase. Comes back down.
      F, F, E, E, D, D, C. Lands on home.
    interaction:
      type: sequence
      keys: ["F4","F4","E4","E4","D4","D4","C4"]

  - id: 8
    mode: play
    type: lh_chord_progression
