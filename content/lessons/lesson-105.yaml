  - id: 15
    mode: see
    type: wrap
    figure: "Celebration card — ACT 21 COMPLETE 🎯. Cleffy holding Twinkle sheet music. A pyramid of acts showing 21/50 complete."
    cleffy: >
      Act 21. Closed.
      You played a whole piece with full harmony. Your right hand and left hand each had their own job.
      Everything from this act showed up: three shapes of a chord, voice-leading, hand independence, drill. One week ago you were doing one-hand melodies.
      Next act — interval names. 2nds, 3rds, all the way to octaves. The vocabulary to talk about what you've been playing.

practice_this_week:
  real_piano:
    - "Twinkle with both hands every day this week. Start slow. Build up to 80 bpm by week's end."
    - "If you have family around — play it for someone. It's a real piece now."
    - "For a challenge: try broken chords in the LH instead of blocked. Roll C-E-G one note at a time."
  virtual_only:
    - "Replay pages 11-13 — guided, then no guides, then at tempo"
  estimated_time: "15 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "First bar of Twinkle — RH C, LH C-E-G chord"
          prompt: "What chord is the LH playing in bar 1?"
          options: ["C major", "F major", "G major"]
          correct: 0
        - figure: "LH chord on bar 7 — B-D-G"
          prompt: "Which chord and inversion?"
          options: ["G major, first inversion", "C major, root", "F major, second inversion"]
          correct: 0
        - figure: "Full piece on grand staff"
          prompt: "Does the LH play one chord per bar or many?"
          options: ["One per bar", "One per beat", "Random"]
          correct: 0
    hear:
      pass_threshold: 1
      questions:
        - audio: "Twinkle with full harmony"
          prompt: "Is the melody the one you know?"
          options: ["Yes", "No"]
          correct: 0
        - audio: "Final bar of Twinkle ending on C major"
          prompt: "Does the piece end on the home note?"
          options: ["Yes", "No"]
          correct: 0
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play the first bar of Twinkle — RH C above LH C-E-G chord."
          accept: "RH C4 and LH C major chord together"

