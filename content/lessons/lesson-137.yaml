  title: "3/4 and 6/8 side by side"
  pages: 7
  opening_cleffy: >
    The two meters look the same on paper. The feel is what matters.
    We'll tap, count, and clap each — slowly — until the difference is obvious.

completion:
  cleffy: >
    3/4 and 6/8 — two separate worlds, now.
    Tomorrow — cut time.
  xp: 17
  unlocks: 138
