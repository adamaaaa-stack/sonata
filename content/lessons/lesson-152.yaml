# ============================================================
# LESSON 152 · LH chords + RH melody
# Tier 4 · Act 31 · Intermediate
# The default classical texture. Revisiting L98 with real independence.
# ============================================================
id: 152
tier: intermediate
act: 31
title: "LH chords + RH melody"
subtitle: "Act 31 · The default texture"
goal: "Play a melody in the right hand while the left hand holds a chord underneath — the sound of most classical piano."
prereqs: [151, 98]
method_focus: "play"
time_estimate_min: 14
piece_context: "You saw this in Lesson 98 — blocked accompaniment. Now you're ready for it as real independence. LH holds. RH sings."
metaphor: "two-hands-two-minds"
vibe: ["gentle", "focused"]

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy pointing at a piano. LH on a held chord (drawn as a solid block). RH on a moving melody line above."
    cleffy: >
      LH holds a chord. RH sings a melody.
      One hand stays still. The other moves.
      This is the sound of most piano music you've ever heard.

  - id: 2
    mode: see
    type: the_texture
    figure: "Grand staff, 4/4. Bar 1: LH whole-note chord C-E-G. RH melody C5-D5-E5-D5 (quarter notes). Bar 2: same LH. Melody continues C5-B4-C5-rest."
    cleffy: >
      Here's the picture.
      LH — a whole-note chord. C, E, G. Held for the full bar.
      RH — a melody. Four quarter notes across the top.
      One hand: held. Other hand: moving.

  - id: 3
    mode: hear
    type: listen
    figure: "Play button. Metronome 60."
    audio:
      A: "LH C-E-G chord held as a whole note. RH melody C5-D5-E5-D5 on beats 1-2-3-4, slow."
    cleffy: >
      Listen.
      The chord rings under. The melody walks on top.
      Hear how the chord never stops sounding?

  - id: 4
    mode: play
    type: lh_alone_chord
    figure: "Keyboard. C4, E4, G4 lit. (LH plays C3, E3, G3 — adjust to LH.) LH chord block."
    cleffy: >
      LH alone. Hold the C chord. Four beats. Don't let go.
    interaction:
      type: rhythm
      sequence: [["C3","E3","G3"]]
      durations: ["whole"]
      tempo: 60

  - id: 5
    mode: play
    type: rh_alone_melody
    figure: "Keyboard. C5, D5, E5 lit. Metronome 60."
    cleffy: >
      RH alone. Four notes. C, D, E, D.
    interaction:
      type: rhythm
      sequence: ["C5","D5","E5","D5"]
      durations: ["quarter","quarter","quarter","quarter"]
      tempo: 60

  - id: 6
    mode: see
    type: how_they_stack
    figure: "Grand staff. One bar. LH whole-note chord drawn as a tall block. RH quarters drawn as arrows moving across the top."
    cleffy: >
      Here's the trick.
      LH presses once at beat 1 — and stays down.
      RH presses four times while LH is holding.
      Your left hand will want to move with the right. It must not.

  - id: 7
    mode: play
    type: both_slow
    figure: "Grand staff. LH C-E-G whole note. RH C5-D5-E5-D5 quarters. Metronome 50."
    cleffy: >
      Both hands. 50 bpm.
      LH presses once. RH sings four notes while it holds.
    interaction:
      type: rhythm
      sequence: [["C3","E3","G3","C5"], "D5", "E5", "D5"]
      durations: ["quarter","quarter","quarter","quarter"]
      tempo: 50

  - id: 8
    mode: play
    type: both_again
    figure: "Same staff. 50 bpm."
    cleffy: >
      Again. Keep LH pressed. Let it ring under the melody.
    interaction:
      type: rhythm
      sequence: [["C3","E3","G3","C5"], "D5", "E5", "D5"]
      durations: ["quarter","quarter","quarter","quarter"]
      tempo: 50
    followup_cleffy: >
      That sound. That's classical piano in three seconds.

  - id: 9
    mode: see
    type: chord_change
    figure: "Grand staff. Two bars. Bar 1: LH C-E-G chord, RH C5-D5-E5-D5. Bar 2: LH G-B-D chord, RH G4-A4-B4-A4."
    cleffy: >
      Two bars. The chord changes in bar 2.
      LH moves to G chord. RH starts a new melody line on G.
      Both hands find a new place at the same moment — beat 1 of bar 2.

  - id: 10
    mode: play
    type: two_bars
    figure: "Grand staff. Two bars. Metronome 55."
    cleffy: >
      Two bars. C chord, then G chord. 55 bpm.
    interaction:
      type: rhythm
      sequence: [["C3","E3","G3","C5"], "D5", "E5", "D5", ["G2","B2","D3","G4"], "A4", "B4", "A4"]
      durations: ["quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter"]
      tempo: 55

  - id: 11
    mode: play
    type: four_bars
    figure: "Grand staff. Four bars — C, F, G, C. LH chord, RH melody in each."
    cleffy: >
      Four bars. C. F. G. C.
      The melody traces each chord gently.
    interaction:
      type: rhythm
      sequence: [["C3","E3","G3","C5"], "D5", "E5", "D5", ["F2","A2","C3","F4"], "G4", "A4", "G4", ["G2","B2","D3","G4"], "A4", "B4", "A4", ["C3","E3","G3","C5"], "D5", "E5", "C5"]
      durations: ["quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter"]
      tempo: 55

  - id: 12
    mode: see
    type: the_texture_everywhere
    figure: "Three tiny score snippets — a hymn, a Mozart sonata, a Chopin nocturne. Each labeled with 'LH chord, RH melody'."
    cleffy: >
      LH chord, RH melody.
      Hymns. Mozart sonatas. Chopin nocturnes.
      Different notes. Same idea.

  - id: 13
    mode: play
    type: final
    figure: "Four bars again. Tempo 60."
    cleffy: >
      Once more. 60 bpm.
    interaction:
      type: rhythm
      sequence: [["C3","E3","G3","C5"], "D5", "E5", "D5", ["F2","A2","C3","F4"], "G4", "A4", "G4", ["G2","B2","D3","G4"], "A4", "B4", "A4", ["C3","E3","G3","C5"], "D5", "E5", "C5"]
      durations: ["quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter","quarter"]
      tempo: 60

  - id: 14
    mode: hear
    type: pre_check
    figure: "Banner."
    cleffy: >
      Three quick ones.

  - id: 15
    mode: see
    type: wrap
    figure: "Postcard — Lesson 152. LH hand resting on a chord. RH hand drawn mid-melody above."
    cleffy: >
      Chord under. Melody over.
      Tomorrow — reverse. LH plays the tune. RH holds.
      Less common. Harder for most people. Worth learning.

practice_this_week:
  real_piano:
    - "The four-bar progression (C, F, G, C) daily. LH chord, RH melody. 55 bpm."
    - "When the chord changes — move both hands exactly together on beat 1."
    - "Listen for LH ringing under the melody. If LH keeps releasing early, hold it longer on purpose."
  virtual_only:
    - "Replay pages 7-8 and page 11 until the chord change feels clean."
  estimated_time: "10 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Grand staff — LH whole-note chord, RH quarter-note melody"
          prompt: "How many times does the LH press in one bar?"
          options: ["Once", "Twice", "Four times"]
          correct: 0
        - figure: "A texture with LH holding a chord while RH plays a tune"
          prompt: "What is this texture called?"
          options: ["Both hands melody", "LH chord + RH melody", "Both hands chord"]
          correct: 1
        - figure: "Two bars, chord changing from C to G"
          prompt: "When does the LH move to the new chord?"
          options: ["Beat 1 of the new bar", "Beat 4 of the old bar", "Halfway through"]
          correct: 0
    hear:
      pass_threshold: 1
      questions:
        - audio: "LH chord held under RH quarter melody"
          prompt: "Which hand is moving more?"
          options: ["Right hand", "Left hand"]
          correct: 0
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play one bar — LH holds C-E-G chord, RH plays C5-D5-E5-D5."
          accept: "LH C-E-G sustained, RH four quarters in sequence"

remediation:
  id: "152.5"
  title: "Hold the chord, walk the melody"
  pages: 8
  opening_cleffy: >
    The trick is LH staying down while RH moves.
    We'll practice LH holding a chord for a full bar with no melody at all, then layer RH in one note at a time.

completion:
  cleffy: >
    Chord under, melody over. You have the default classical texture.
    Tomorrow — swap the roles.
  xp: 18
  unlocks: 153
