# ============================================================
# LESSON 173 · Moonlight 1 — pedal changes
# Tier 4 · Act 35 · Intermediate
# One pedal change per bar — when the harmony shifts.
# ============================================================
id: 173
tier: intermediate
act: 35
title: "Moonlight 1 — pedal changes"
subtitle: "Act 35 · One change per bar"
goal: "Change the sustain pedal exactly once per bar — every time the harmony shifts underneath the melody."
prereqs: [156, 157, 158, 159, 160, 170, 171, 172]
method_focus: "play"
time_estimate_min: 15
piece_context: "Beethoven marked Moonlight 'senza sordino' — no dampers. Pedal down, the whole time. But if you literally hold one pedal across eight bars of changing harmonies, you get mud. Modern pianists change the pedal once per bar — each time the chord underneath shifts. That's what keeps Moonlight blurred-but-not-muddy. The harmony map: C#m → C#m → B → E → A → F#m → G#7 → C#m. One pedal per bar, always."
metaphor: "pedal-with-the-harmony"
vibe: ["quiet", "focused", "serious"]

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy gesturing at his right foot. A pedal drawn below the piano, down-up-down-up-down. A moon above."
    cleffy: >
      The pedal in Moonlight.
      Beethoven's note said: 'pedal down, no dampers.'
      Modern pianos are different. Hold one pedal for eight bars and the whole thing turns to mud.
      You change it. Once per bar.

  - id: 2
    mode: see
    type: the_harmony_map
    figure: "Eight bars in a row. Each bar labelled with a chord: 1-C#m | 2-C#m | 3-B | 4-E | 5-A | 6-F#m | 7-G#7 | 8-C#m. Vertical lines between bars marked 'pedal change.'"
    cleffy: >
      Eight bars. Eight chords underneath the triplet engine.
      Look at the map. When the chord changes, the pedal changes.
      C-sharp minor. C-sharp minor. B. E. A. F-sharp minor. G-sharp seven. Home to C-sharp minor.
      Don't memorize the names today. Just see — the chord moves.

  - id: 3
    mode: hear
    type: listen_no_pedal_changes
    figure: "Play button. Caption: 'no pedal changes — one long hold.'"
    audio:
      A: "Moonlight bars 1-4 played with the pedal held down the entire time. Noticeably muddy."
    cleffy: >
      Listen to this. Pedal held for four bars, no changes.
      Hear the mud? Every chord piled on top of the last. The sound smears.

  - id: 4
    mode: hear
    type: listen_with_pedal_changes
    figure: "Play button. Caption: 'clean — one change per bar.'"
    audio:
      A: "Same four bars, with pedal lifted and pressed again at each bar line. Clean, resonant, blurred but clear."
    cleffy: >
      Now listen again. One change per bar.
      Still blurred. Still dreamy. But every chord comes through on its own.
      That's the trick.

  - id: 5
    mode: see
    type: the_syncopated_pedal
    figure: "Diagram. A bar with three beats marked. An arrow pointing to beat 1 — 'play the note.' A second arrow curving down to the 'and' of beat 1 — 'then press pedal.'"
    cleffy: >
      One small detail. The pedal doesn't press on the beat.
      You play the first note of the new bar. Then — a tiny moment later — the pedal comes down.
      That's called syncopated pedaling. You learned this back in Act 32.

  - id: 6
    mode: see
    type: the_physical_motion
    figure: "Diagram of right foot pedaling. Sequence: 1) foot up at start of bar, 2) hands play, 3) foot presses down, 4) foot lifts at end of bar, 5) repeat."
    cleffy: >
      The motion.
      Foot up at the start of each bar.
      Play the first note.
      Foot presses down — captures the new chord.
      Foot lifts at the end of the bar — clears the old chord.
      Down-up. Down-up. Once per bar.

  - id: 7
    mode: play
    type: play_bar_1_with_pedal
    figure: "Bar 1 of Moonlight. Triplet arpeggios C#-E-G# rolling. Pedal symbol at start, pedal-lift symbol at end. Tempo 50."
    cleffy: >
      Bar 1. C-sharp minor triplets.
      Play the first note, press the pedal, let the whole bar ring.
      Lift the pedal right at the end before the next bar starts.
    interaction:
      type: rhythm
      sequence: ["C#4","E4","G#4","C#4","E4","G#4","C#4","E4","G#4","C#4","E4","G#4"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 50

  - id: 8
    mode: see
    type: bars_3_4_shift
    figure: "Two bars side by side. Bar 3: B major chord underneath (B-D#-F#). Bar 4: E major chord underneath (E-G#-B). Arrows at bar lines: 'pedal changes here.'"
    cleffy: >
      Look at bars 3 and 4.
      Bar 3 — the engine shifts to a B chord. B, D-sharp, F-sharp.
      Bar 4 — shifts again to E. E, G-sharp, B.
      (Simplified — the real bar 4 is more harmonically restless.)
      Every bar, new chord, new pedal.

  - id: 9
    mode: play
    type: play_two_bars_changing
    figure: "Two bars. Bar 1 C#m triplets. Bar 2 B major triplets. Pedal changes at the bar line. Tempo 50."
    cleffy: >
      Two bars. C-sharp minor, then B.
      Lift the pedal as you cross from bar 1 to bar 2.
      Foot up, play, foot down.
    interaction:
      type: rhythm
      sequence: ["C#4","E4","G#4","C#4","E4","G#4","C#4","E4","G#4","C#4","E4","G#4","B3","D#4","F#4","B3","D#4","F#4","B3","D#4","F#4","B3","D#4","F#4"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 50

  - id: 10
    mode: see
    type: the_eight_bar_map
    figure: "Full eight-bar roadmap again with pedal marks under each bar. Eight pedal-down symbols. Eight pedal-lift symbols. Caption: 'one change at every bar line.'"
    cleffy: >
      Here's the whole map.
      Eight bars. Eight pedal changes. Always at the bar line.
      Hands keep going. Foot does its own small dance.

  - id: 11
    mode: play
    type: bars_1_4_pedaled
    figure: "Bars 1-4, simplified engine only. Pedal marks at each bar line. Tempo 50."
    cleffy: >
      Bars 1 through 4. Just the engine. Four pedal changes.
      Listen for clean chord edges — no smear between bars.
    interaction:
      type: rhythm
      sequence: ["C#4","E4","G#4","C#4","E4","G#4","C#4","E4","G#4","C#4","E4","G#4","B3","D#4","F#4","B3","D#4","F#4","E4","G#4","B4","E4","G#4","B4"]
      durations: ["triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth","triplet_eighth"]
      tempo: 50

  - id: 12
    mode: play
    type: bars_5_8_with_melody_and_pedal
    figure: "Bars 5-8. Melody on top, simplified engine, pedal changes at every bar line. Tempo 50."
    cleffy: >
      Bars 5 through 8. Melody returns.
      Same pedal rule. Change at every bar line.
      Three things at once now — melody, engine, pedal. Slow is fine.
    interaction:
      type: song
      sequence: [["C#2","G#4"],"G#4","G#4","G#4","G#4","A4","A4","A4","G#4","G#4","F#4","E4"]
      guides: true
      tempo: 50

  - id: 13
    mode: see
    type: what_to_listen_for
    figure: "Diagram. A sound wave. First part labelled 'blurred — pedal on.' A tiny dip at the bar line. Second part labelled 'still blurred — but new chord.' Caption: 'dreamy, not muddy.'"
    cleffy: >
      What you're listening for —
      The sound stays blurred. Still pedaled. Still dreamy.
      But at each bar line, the old chord drops out and the new one steps forward.
      That's the goal. Dreamy. Not muddy.

  - id: 14
    mode: hear
    type: pre_check
    figure: "Banner — Lesson 173 mastery check."
    cleffy: >
      Three quick ones.

practice_this_week:
  real_piano:
    - "Play bars 1-4, pedal changing at every bar line. Listen for the clean edges."
    - "Then bars 5-8, melody on top, pedal changing with the harmony."
    - "If you can, do it in the dark. Easier to hear mud when you can't see."
  virtual_only:
    - "Replay pages 11 and 12 — full bars with pedal changes."
  estimated_time: "10 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Eight-bar pedal map, one change per bar"
          prompt: "How often does the pedal change in these 8 bars?"
          options: ["Once, at the end", "Once per bar", "Never — held the whole time"]
          correct: 1
        - figure: "Pedal-lift mark at the bar line, then pedal-down mark just after"
          prompt: "When does the pedal go down on the new bar?"
          options: ["Right on the first note", "A tiny moment after the first note", "At the end of the bar"]
          correct: 1
        - figure: "Two versions of the same bars — one muddy, one clean"
          prompt: "What causes mud?"
          options: ["Playing too loud", "Not changing the pedal when the harmony changes", "Using the wrong finger"]
          correct: 1
    hear:
      pass_threshold: 1
      questions:
        - audio: "Same passage played two ways — held pedal vs changed pedal"
          prompt: "Which one is clean?"
          options: ["The one with held pedal", "The one with pedal changes"]
          correct: 1
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play two bars of triplets — C-sharp minor then B — changing pedal at the bar line."
          accept: "C#m triplets then B triplets with pedal change audible between"

