  - id: 12
    mode: see
    type: the_honest_check
    figure: "Three checkboxes. Tempo held steady (no accelerating). Pedal changed at every harmony shift. Dynamic stayed mostly pp with one small rise in B."
    cleffy: >
      Three honest questions about the last run.
      Did the tempo hold? Or did you speed up in the middle?
      Did the pedal change with the harmony? Or did the sound get muddy?
      Did it stay soft? Or did the melody push too hard?
      Whatever the answers — tomorrow you run it again, and again, until they're yes.

