# ============================================================
# LESSON 248 · Moonlight 1 — full at near-tempo
# Tier 6 · Act 50 · Advanced
# Adagio sostenuto, near real speed. Not too fast. This piece is slow.
# ============================================================
id: 248
tier: advanced
act: 50
title: "Moonlight 1 — full at near-tempo"
subtitle: "Act 50 · The final act"
goal: "Full Moonlight first movement, bars 1-69, at near-real tempo. Adagio sostenuto — quarter ≈ 56-60. No faster."
prereqs: [247, 245]
method_focus: "combine"
time_estimate_min: 18
piece_context: "L245 was full Moonlight, slow and careful. Today — the same piece, a little faster. Near real tempo. Adagio sostenuto is *not* fast. Beethoven meant slow. Too fast and it sounds nervous. Right speed and it breathes."
metaphor: "real-breath"
vibe: ["quiet", "focused", "serious"]

piece:
  title: "Moonlight Sonata, 1st movement (full, bars 1-69)"
  composer: "Beethoven (1801)"
  key_center: "C-sharp minor"
  time_signature: "alla breve — felt in 4"
  difficulty: "advanced — full movement, near-real tempo, all three sections, pedal, voicing, arc"

pages:
  - id: 1
    mode: see
    type: hook
    figure: "Cleffy at the piano. A metronome set to 56. Caption: 'adagio sostenuto.'"
    cleffy: >
      Today — full Moonlight. All sixty-nine bars.
      Close to real tempo.
      Close. Not fast.

  - id: 2
    mode: see
    type: what_adagio_means
    figure: "A tempo dial. 40 on the left (grave), 56-60 in the middle (adagio sostenuto, highlighted), 80 on the right (andante). Caption: 'adagio sostenuto sits here.'"
    cleffy: >
      Adagio sostenuto.
      Quarter note equals roughly 56 to 60.
      Slow. Sustained.
      Most recordings come in between 54 and 60. A very few go faster. Most of those sound rushed.
      We'll land at 58.

  - id: 3
    mode: see
    type: why_slow
    figure: "A slow-burning candle next to a fast-flickering flame. Caption: 'pick which one is Moonlight.'"
    cleffy: >
      Why so slow?
      Because the piece is a thought, not a sentence.
      Each triplet is a breath.
      Each bar is a moment of light.
      Too fast and it turns into a wind-up toy.
      Beethoven wrote 'delicatissimamente.' Most delicately. There is no hurry anywhere.

  - id: 4
    mode: hear
    type: listen_reference
    figure: "Play button. Caption: 'Moonlight at 58. Full.'"
    audio:
      A: "Full Moonlight 1st movement, bars 1-69, at quarter = 58. Voiced melody, proper pedal, pp throughout."
    cleffy: >
      Listen once. All of it.
      At your tempo today.
      Don't play along yet. Just hear it.

  - id: 5
    mode: see
    type: the_three_sections
    figure: "A piece map. Section A — bars 1-23 (opening through the first modulation). Section B — bars 24-42 (middle, modulating). Section A' — bars 43-69 (return and coda). Each labeled."
    cleffy: >
      The map you already know.
      Section A — bars 1 through 23. The opening. The theme.
      Section B — bars 24 through 42. The modulation.
      Section A' — bars 43 through 69. The return and the quiet descent.
      One arc. Three chapters.

  - id: 6
    mode: see
    type: tempo_discipline
    figure: "A metronome with 58 glowing. A small warning card next to it: 'do not accelerate. Ever.'"
    cleffy: >
      Tempo discipline.
      The biggest trap in this piece — speeding up when your hands feel comfortable.
      Don't.
      58 at bar 1. 58 at bar 40. 58 at bar 69.
      Let the metronome check you for the first few runs. Then trust your ear.

