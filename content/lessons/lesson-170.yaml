    figure: "Grand staff. All four opening bars. Guides on. Metronome 48."
    cleffy: >
      All four bars. Guides on. Forty-eight on the click.
      Left hand — strike, hold. Right hand — roll, endless.
    interaction:
      type: song
      sequence: [["C#4", "C#2", "C#3"], "E4", "G#4", "C#4", "E4", "G#4", "C#4", "E4", "G#4", "C#4", "E4", "G#4", ["C#4", "C#2", "C#3"], "E4", "G#4", "C#4", "E4", "G#4", "C#4", "E4", "G#4", "C#4", "E4", "G#4", ["C#4", "C#2", "C#3"], "E4", "G#4", "C#4", "E4", "G#4", "C#4", "E4", "G#4", "C#4", "E4", "G#4", ["C#4", "C#2", "C#3"], "E4", "G#4", "C#4", "E4", "G#4", "C#4", "E4", "G#4", "C#4", "E4", "G#4"]
