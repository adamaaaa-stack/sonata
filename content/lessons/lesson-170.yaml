    figure: "Banner — Act 34 boss mastery check."
    cleffy: >
      Four quick ones. Take your time.

  - id: 16
    mode: see
    type: wrap
    figure: "Celebration card — ACT 34 COMPLETE 🎯. Cleffy looking at moonlight through a window, piano open. Map of acts: 34/50 complete. Banner: FIRST BRICK LAID."
    cleffy: >
      Act 34. Closed.
      You just played the opening of Moonlight Sonata. Four bars, slow, both hands.
      First brick. The graduation piece starts here.
      Next act — bars five through eight. The melody enters. The piece really begins.

practice_this_week:
  real_piano:
    - "Play the four bars every day. Slow. Never faster than 50 bpm this week — the speed will come much later."
    - "Try it with the sustain pedal down the whole bar, then clear it when the left hand strikes the next bar. That's the sound."
    - "Listen to the full Moonlight 1st movement recording at least once. Hear where you are — and where you're going."
  virtual_only:
    - "Replay pages 10, 11, 12, 13, and 14. Each one builds the last."
  estimated_time: "15 min/day"

mastery_check:
  sections:
    see:
      pass_threshold: 2
      questions:
        - figure: "Italian markings on the Moonlight score"
          prompt: "What does 'adagio sostenuto' mean?"
          options: ["Fast and loud", "Slow and sustained", "Light and playful"]
          correct: 1
        - figure: "Right-hand opening of Moonlight — one triplet"
          prompt: "Which three notes does the triplet arpeggio use?"
          options: ["C, E, G", "C#, E, G#", "D, F, A"]
          correct: 1
        - figure: "Left-hand opening of Moonlight — one bar"
          prompt: "What does the left hand play in bar 1?"
          options: ["An octave of C-sharp, held", "A rolling C-sharp minor chord", "Nothing"]
          correct: 0
    hear:
      pass_threshold: 1
      questions:
        - audio: "Moonlight opening four bars, real recording"
          prompt: "Which hand has the melody in these bars?"
          options: ["Right hand", "Left hand", "Neither — no melody yet"]
          correct: 2
    play:
      pass_threshold: 1
      questions:
        - prompt: "Play bar one of Moonlight: LH C#2-C#3 octave held, RH triplet arpeggio C#4-E4-G#4 four times, at 48 bpm."
          accept: "LH C#2 and C#3 held as octave, RH four triplet groups of C#4 E4 G#4"

